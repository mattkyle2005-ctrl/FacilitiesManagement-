<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, useRef } = React;

const STORAGE_KEY = "neil_totem_pole_tracker_v1";

const PRIORITY_EXAMPLES = {

function statusClass(s) { return "status-" + String(s).replace(/[^A-Za-z]/g, ""); }
function condClass(c) { return "cond-" + String(c).replace(/[^A-Za-z]/g, ""); }
function phaseStatusClass(s) { return "phase-" + String(s).replace(/[^A-Za-z]/g, ""); }

function sanitizeApiKey(raw) {
  return String(raw || "").replace(/\s+/g, "").replace(/[^\x20-\x7E]/g, "");
}

function friendlyErrorMessage(e) {
  const msg = e && e.message ? e.message : String(e);
  if (/ISO-8859-1|code point/i.test(msg)) {
    return "Your API key contains a character the browser can't send (likely from copy-pasting). Try deleting it in Settings and re-typing or re-pasting it fresh.";
  }
  return msg;
}

async function callClaude(apiKey, model, prompt) {
  const cleanKey = sanitizeApiKey(apiKey);
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": cleanKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: model,
      max_tokens: 1100,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error("API error " + resp.status + ": " + errText.slice(0, 300));
  }
  const data = await resp.json();
  const text = (data.content && data.content[0] && data.content[0].text) || "";
  return text;
}

function uid() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return "id-" + Math.random().toString(36).slice(2) + Date.now();
}
function todayStr() { return new Date().toISOString().slice(0, 10); }
function nowStamp() { return new Date().toISOString(); }
function formatRand(n) {
  const num = Number(n) || 0;
  return "R " + num.toLocaleString("en-US");
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toCSVValue(v) {
  if (v === undefined || v === null) return "";
  const s = String(v);
  if (s.includes(",") || s.includes('"') || s.includes("\n")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if (lines.length === 0) return [];
  const parseLine = (line) => {
    const out = [];
    let cur = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { out.push(cur); cur = ""; }
      else { cur += ch; }
    }
    out.push(cur);
    return out.map(s => s.trim());
  };
  const header = parseLine(lines[0]).map(h => h.toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = parseLine(lines[i]);
    const rec = {};
    header.forEach((h, idx) => { rec[h] = cells[idx] !== undefined ? cells[idx] : ""; });
    rows.push(rec);
  }
  return rows;
}

function parseExcelFile(file, callback) {
  try {
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: "array" });
        const sheetName = workbook.SheetNames[0];
        if (!sheetName) { callback([]); return; }
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
        const normalized = rows.map(r => {
          const rec = {};
          Object.keys(r).forEach(k => { rec[k.toLowerCase().trim()] = String(r[k] || "").trim(); });
          return rec;
        });
        callback(normalized);
      } catch (e) {
        console.error("Error parsing Excel file", e);
        callback([]);
      }
    };
    reader.onerror = () => callback([]);
    reader.readAsArrayBuffer(file);
  } catch (e) {
    console.error("Error reading Excel file", e);
    callback([]);
  }
}

// Resize a photo client-side before storing as a data URL, so a handful of
// before/after site photos per pole doesn't blow past localStorage's quota.
function resizeImageFile(file, maxDim, callback) {
  try {
    const reader = new FileReader();
    reader.onload = (evt) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        callback(canvas.toDataURL("image/jpeg", 0.75));
      };
      img.onerror = () => callback(null);
      img.src = evt.target.result;
    };
    reader.onerror = () => callback(null);
    reader.readAsDataURL(file);
  } catch (e) {
    callback(null);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;

  } catch (e) {
    console.error("Failed to load saved state", e);

}
function saveState(state) {
  try {

    console.error("Failed to save state", e);

// --- Metrics -------------------------------------------------------------
// Pure function so it's directly testable and so the AI prompt and the
// on-screen dashboard always agree on the same numbers.
function computeMetrics(poles, phases, resource, clusterTargets) {
  const totalAssessed = poles.length;
  const totalRefurbished = poles.filter(p => DONE_STATUSES.includes(p.status)).length;
  const pctComplete = totalAssessed > 0 ? Math.round((totalRefurbished / totalAssessed) * 100) : 0;

  const conditionBreakdown = { Good: 0, Fair: 0, Poor: 0, "Beyond Repair": 0 };
  poles.forEach(p => { if (conditionBreakdown[p.condition] !== undefined) conditionBreakdown[p.condition] += 1; });

  const clusterCoverage = (clusterTargets || []).map(t => {
    const entered = poles.filter(p => p.cluster === t.cluster).length;
    const pct = t.low > 0 ? Math.min(100, Math.round((entered / t.low) * 100)) : 0;
    return { cluster: t.cluster, entered, low: t.low, high: t.high, pct };
  });

  const priorityProgress = PRIORITIES.map(p => {
    const inTier = poles.filter(pl => pl.priority === p);
    const done = inTier.filter(pl => DONE_STATUSES.includes(pl.status)).length;
    return { priority: p, total: inTier.length, done, pct: inTier.length > 0 ? Math.round((done / inTier.length) * 100) : 0 };
  });

  const phaseSummary = (phases || []).map(ph => ({
    name: ph.name, status: ph.status, weeks: ph.weeks,
    deliverablesDone: (ph.deliverables || []).filter(d => d.done).length,
    deliverablesTotal: (ph.deliverables || []).length
  }));

  const totalEstimatedCostRegister = poles.reduce((sum, p) => sum + (Number(p.estimatedCost) || 0), 0);
  const budgetAllocated = (resource && Number(resource.budgetAllocated)) || 0;
  const budgetSpent = (resource && Number(resource.budgetSpent)) || 0;
  const budgetPct = budgetAllocated > 0 ? Math.round((budgetSpent / budgetAllocated) * 100) : 0;

  const visualDocCount = poles.filter(p => p.photoBefore && p.photoAfter).length;

  return {
    totalAssessed, totalRefurbished, pctComplete, conditionBreakdown, clusterCoverage,
    priorityProgress, phaseSummary, totalEstimatedCostRegister, budgetAllocated, budgetSpent,
    budgetPct, visualDocCount, chosenModel: (resource && resource.chosenModel) || "(not yet decided)"
  };
}

function buildExecutiveSummaryPrompt(metrics, notes) {
  const condLines = Object.keys(metrics.conditionBreakdown).map(k => k + ": " + metrics.conditionBreakdown[k]).join(", ");
  const clusterLines = metrics.clusterCoverage.map(c =>
    c.cluster + ": " + c.entered + " logged vs target " + c.low + (c.high ? "–" + c.high : "+") + " (" + c.pct + "% coverage)"
  ).join("; ");
  const priorityLines = metrics.priorityProgress.map(p =>
    PRIORITY_LABEL[p.priority] + ": " + p.done + "/" + p.total + " refurbished (" + p.pct + "%)"
  ).join("; ");
  const phaseLines = metrics.phaseSummary.map(p =>
    p.name + " — " + p.status + " (" + p.deliverablesDone + "/" + p.deliverablesTotal + " deliverables done)"
  ).join("\n");
  const styleNote = (notes || "").trim() ? "\n\nStyle notes to follow: " + notes.trim() : "";

  return "You are writing a short executive status summary for Neil Arendse, Senior Manager: Public Transportation Facilities Management and Enforcement, City of Cape Town, on the Totem Pole Repainting project (repainting/refurbishing public transport totem poles across the network, target completion September/October 2026)." + styleNote + "\n\n"
    + "Respond with ONLY a JSON object, no other text, matching exactly this shape:\n"
    + '{"execSummary": "2-3 sentence overview of where the project stands right now", "progressHighlights": "bullet-style lines (use \\n between them) of genuine progress so far", "risksAndBlockers": "bullet-style lines (use \\n between them) of real risks or blockers visible in the data below", "nextSteps": "bullet-style lines (use \\n between them) of the most useful next actions"}\n\n'
    + "=== PROJECT DATA ===\n"
    + "Total poles assessed/logged: " + metrics.totalAssessed + "\n"
    + "Total poles refurbished/verified: " + metrics.totalRefurbished + " (" + metrics.pctComplete + "% of logged poles)\n"
    + "Condition breakdown: " + condLines + "\n"
    + "Cluster coverage vs Zutari reference targets: " + clusterLines + "\n"
    + "Priority tier progress: " + priorityLines + "\n"
    + "Phase status:\n" + phaseLines + "\n"
    + "Budget allocated: R" + metrics.budgetAllocated + " · Budget spent: R" + metrics.budgetSpent + " (" + metrics.budgetPct + "%)\n"
    + "Total estimated cost from register entries so far: R" + metrics.totalEstimatedCostRegister + "\n"
    + "Delivery model chosen: " + metrics.chosenModel + "\n"
    + "Before/after photo pairs documented (visual improvement evidence): " + metrics.visualDocCount + "\n\n"
    + "Reference every number above accurately — do not invent figures not shown here. Reference specific phases/clusters by name where relevant.";
}

function parseTolerantJSON(raw) {
  try { return JSON.parse(raw); } catch (e) {
    const match = raw.match(/\{[\s\S]*\}/);
    if (match) { try { return JSON.parse(match[0]); } catch (e2) { /* fall through */ } }
    return null;
  }
}

      return [...prev, p];

                  {aiSummary.risksAndBlockers && <div className="ai-box"><h4>Risks &amp; Blockers</h4>{aiSummary.risksAndBlockers}</div>}
                  {aiSummary.nextSteps && <div className="ai-box"><h4>Next Steps</h4>{aiSummary.nextSteps}</div>}
                  <div className="flex no-print" style={{ marginTop: "8px" }}>
                    <button className="btn ghost small" onClick={copySummaryToClipboard}>{copied ? "Copied!" : "Copy Summary"}</button>
                    <button className="btn ghost small" onClick={() => window.print()}>Export as PDF</button>
                  </div>
                </React.Fragment>
              )}
            </div>
            <div className="card">
              <h2>Condition Breakdown</h2>
              <p className="small">Straight from the Action Plan's Activity Categories: Good → cleaning only, Fair → repaint, Poor → full refurbishment, Beyond Repair → replacement.</p>
              <div className="grid cols-4">
                {CONDITIONS.map(c => (
                  <div className="stat" key={c}>
                    <div className="num">{metrics.conditionBreakdown[c]}</div>
                    <div className="lbl"><span className={"badge cond-" + c.replace(/[^A-Za-z]/g, "")}>{c}</span></div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card">
              <h2>Cluster Coverage</h2>
              <p className="small">Poles logged in the register so far vs the Zutari Conditional Report (June 2025) reference targets, editable in Settings.</p>
              {metrics.clusterCoverage.map(c => (
                <div className="bar-row" key={c.cluster}>
                  <div>{c.cluster}</div>
                  <div className="bar-track">
                    <div className={"bar-fill" + (c.pct >= 100 ? " good" : "")} style={{ width: Math.min(100, (c.entered / maxClusterEntered) * 100) + "%" }}></div>
                  </div>
                  <div className="small">{c.entered} / {c.low}{c.high ? "–" + c.high : "+"}</div>
                </div>
              ))}
            </div>
            <div className="card">
              <h2>Priority Tier Progress</h2>
              {metrics.priorityProgress.map(p => (
                <div className="bar-row" key={p.priority}>
                  <div>{PRIORITY_LABEL[p.priority]}</div>
                  <div className="bar-track">
                    <div className="bar-fill good" style={{ width: (p.total ? (p.done / p.total) * 100 : 0) + "%" }}></div>
                  </div>
                  <div className="small">{p.done} / {p.total} ({p.pct}%)</div>
                </div>
              ))}
            </div>
            <div className="card">
              <h2>Phase Status</h2>
              <div className="flex" style={{ flexWrap: "wrap" }}>
                {phases.map(ph => (
                  <span key={ph.id} className="pill" style={{ marginBottom: "6px" }}>
                    {ph.name.replace(/^Phase \d+: /, "")} <span className={"badge " + phaseStatusClass(ph.status)} style={{ marginLeft: "6px" }}>{ph.status}</span>
                  </span>
                ))}
              </div>
              <p className="small" style={{ marginTop: "8px" }}>See the Phases &amp; Roadmap tab to update status and deliverable checklists.</p>
            </div>
            <div className="card">
              <h2>Visual Improvement Outcomes</h2>
              <p className="small">{metrics.visualDocCount} pole{metrics.visualDocCount === 1 ? "" : "s"} with both a before and an after photo on file — the Phase 7 close-out deliverable this figure feeds directly.</p>
              {metrics.visualDocCount === 0 && <p className="small">None documented yet — this fills in automatically as before/after photos are captured on the Asset Register tab.</p>}
              <div className="flex">
                {poles.filter(p => p.photoBefore && p.photoAfter).map(p => (
                  <div key={p.id} className="flex">
                    <img src={p.photoBefore} className="photo-thumb" onClick={() => setLightboxSrc(p.photoBefore)} />
                    <img src={p.photoAfter} className="photo-thumb" onClick={() => setLightboxSrc(p.photoAfter)} />
                  </div>
                ))}
              </div>
            </div>
          </React.Fragment>
        )}

        {tab === "register" && (
          <React.Fragment>
            <div className="toolbar">
              <button className="btn gold" onClick={() => { setEditingPole(null); setShowPoleForm(true); }}>+ Add Pole</button>
              <input type="text" placeholder="Search Pole ID or location..." value={search} onChange={e => setSearch(e.target.value)} />
              <select value={filterCluster} onChange={e => setFilterCluster(e.target.value)}><option>All</option>{CLUSTERS.map(c => <option key={c}>{c}</option>)}</select>
              <select value={filterCondition} onChange={e => setFilterCondition(e.target.value)}><option>All</option>{CONDITIONS.map(c => <option key={c}>{c}</option>)}</select>
              <select value={filterPriority} onChange={e => setFilterPriority(e.target.value)}><option value="All">All Priorities</option>{PRIORITIES.map(p => <option key={p} value={p}>{PRIORITY_LABEL[p]}</option>)}</select>
              <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}><option>All</option>{STATUSES.map(s => <option key={s}>{s}</option>)}</select>
              <span className="pill">{filteredPoles.length} of {poles.length} poles</span>
            </div>
            {filteredPoles.length === 0 && <p className="small">No poles match the current filters.</p>}
            <div className="desktop-only">
              <table>
                <thead>
                  <tr><th>Pole ID</th><th>Location</th><th>Cluster</th><th>Category</th><th>Condition</th><th>Priority</th><th>Status</th><th>Est. Cost</th><th></th></tr>
                </thead>
                <tbody>
                  {filteredPoles.map(p => (
                    <tr key={p.id}>
                      <td>{p.poleId}</td>
                      <td>{p.location}</td>
                      <td>{p.cluster}</td>
                      <td>{p.category}</td>
                      <td><span className={"badge " + condClass(p.condition)}>{p.condition}</span></td>
                      <td><span className={"badge priority-" + p.priority}>P{p.priority}</span></td>
                      <td><span className={"badge " + statusClass(p.status)}>{p.status}</span></td>
                      <td>{formatRand(p.estimatedCost)}</td>
                      <td>
                        <div className="flex">
                          <button className="btn ghost small" onClick={() => { setEditingPole(p); setShowPoleForm(true); }}>Edit</button>
                          <button className="btn danger small" onClick={() => deletePole(p.id)}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="mobile-only">
              {filteredPoles.map(p => (
                <div className="item-card" key={p.id}>
                  <div className="ic-top">
                    <div>
                      <div className="ic-name">{p.poleId} — {p.location}</div>
                      <div className="ic-meta">{p.cluster} · {p.category}</div>
                    </div>
                    <span className={"badge " + statusClass(p.status)}>{p.status}</span>
                  </div>
                  <div className="flex" style={{ marginTop: "6px" }}>
                    <span className={"badge " + condClass(p.condition)}>{p.condition}</span>
                    <span className={"badge priority-" + p.priority}>P{p.priority}</span>
                    <span className="small">{formatRand(p.estimatedCost)}</span>
                  </div>
                  <div className="flex" style={{ marginTop: "8px" }}>
                    <button className="btn ghost small" onClick={() => { setEditingPole(p); setShowPoleForm(true); }}>Edit</button>
                    <button className="btn danger small" onClick={() => deletePole(p.id)}>Delete</button>
                  </div>
                </div>
              ))}
            </div>
          </React.Fragment>
        )}

        {tab === "phases" && (
          <React.Fragment>
            {phases.map(ph => (
              <div className="phase-card" key={ph.id}>
                <div className="phase-head">
                  <div>
                    <div className="phase-title">{ph.name}</div>
                    <div className="phase-meta">{ph.weeks}{ph.targetDate ? " · " + ph.targetDate : ""}</div>
                  </div>
                  <select style={{ width: "150px" }} value={ph.status} onChange={e => updatePhase(ph.id, { status: e.target.value })}>
                    <option>Not Started</option><option>In Progress</option><option>Complete</option>
                  </select>
                </div>
                <div style={{ marginTop: "10px" }}>
                  {ph.deliverables.map((d, i) => (
                    <div className={"deliverable-row" + (d.done ? " done" : "")} key={i}>
                      <input type="checkbox" checked={d.done} onChange={() => toggleDeliverable(ph.id, i)} />
                      <span>{d.text}</span>
                    </div>
                  ))}
                </div>
                <div className="field" style={{ marginTop: "8px" }}>
                  <label>Notes</label>
                  <textarea rows="2" value={ph.notes} onChange={e => updatePhase(ph.id, { notes: e.target.value })} />
                </div>
              </div>
            ))}
          </React.Fragment>
        )}

        {tab === "priority" && (
          <React.Fragment>
            {PRIORITIES.map(p => {
              const row = metrics.priorityProgress.find(x => x.priority === p);
              return (
                <div className="card" key={p}>
                  <h2>{PRIORITY_LABEL[p]}</h2>
                  <p className="small">Example locations from the Action Plan: {PRIORITY_EXAMPLES[p]}</p>
                  <div className="bar-row">
                    <div>Refurbished</div>
                    <div className="bar-track"><div className="bar-fill good" style={{ width: (row && row.total ? (row.done / row.total) * 100 : 0) + "%" }}></div></div>
                    <div className="small">{row ? row.done : 0} / {row ? row.total : 0}</div>
                  </div>
                </div>
              );
            })}
            <div className="card">
              <h2>Cluster Targets (Zutari Conditional Report, June 2025)</h2>
              <p className="small">Reference totals for the whole network — Phase 1's job is to confirm these against the real GIS-based register. Edit targets in Settings if a more accurate count comes back from the assessment.</p>
              <table>
                <thead><tr><th>Cluster</th><th>Logged</th><th>Target</th><th>Coverage</th></tr></thead>
                <tbody>
                  {metrics.clusterCoverage.map(c => (
                    <tr key={c.cluster}>
                      <td>{c.cluster}</td><td>{c.entered}</td><td>{c.low}{c.high ? "–" + c.high : "+"}</td><td>{c.pct}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </React.Fragment>
        )}

        {tab === "resource" && (
          <React.Fragment>
            <div className="card">
              <h2>Delivery Model</h2>
              <p className="small">Funding constraints should be addressed through collaboration with RIM (as flagged in the Action Plan). Three delivery models are on the table:</p>
              <div className="grid cols-3">
                <div className={"model-card" + (resource.chosenModel === "Option A" ? " chosen" : "")}>
                  <h4>Option A — Internal Resources</h4>
                  <ul><li>FM Contractor teams</li><li>Existing term contracts</li></ul>
                </div>
                <div className={"model-card" + (resource.chosenModel === "Option B" ? " chosen" : "")}>
                  <h4>Option B — Hybrid Model</h4>
                  <ul><li>Internal preparation</li><li>External contractor painting</li></ul>
                  <p className="small" style={{ marginTop: "6px" }}>The plan itself flags this as usually the fastest — a recommendation, not yet a confirmed decision.</p>
                </div>
                <div className={"model-card" + (resource.chosenModel === "Option C" ? " chosen" : "")}>
                  <h4>Option C — Area-Based Contract</h4>
                  <ul><li>Cluster poles geographically</li><li>Appoint contractors per region</li></ul>
                </div>
              </div>
              <div className="field" style={{ marginTop: "12px" }}>
                <label>Chosen Model</label>
                <select value={resource.chosenModel} onChange={e => setResource(prev => ({ ...prev, chosenModel: e.target.value }))}>
                  <option value="">Not yet decided</option>
                  <option>Option A</option><option>Option B</option><option>Option C</option>
                </select>
              </div>
            </div>
            <div className="card">
              <h2>Budget</h2>
              <div className="grid cols-2">
                <div className="field"><label>Budget Allocated (R)</label><input type="number" value={resource.budgetAllocated} onChange={e => setResource(prev => ({ ...prev, budgetAllocated: Number(e.target.value) || 0 }))} /></div>
                <div className="field"><label>Budget Spent (R)</label><input type="number" value={resource.budgetSpent} onChange={e => setResource(prev => ({ ...prev, budgetSpent: Number(e.target.value) || 0 }))} /></div>
              </div>
              <div className="bar-row">
                <div>Spent</div>
                <div className="bar-track"><div className={"bar-fill" + (metrics.budgetPct >= 90 ? " over" : "")} style={{ width: Math.min(100, metrics.budgetPct) + "%" }}></div></div>
                <div className="small">{metrics.budgetPct}%</div>
              </div>
              <p className="small">Total estimated cost from register entries logged so far: {formatRand(metrics.totalEstimatedCostRegister)} (a cross-check, not necessarily the same as actual spend).</p>
            </div>
            <div className="card">
              <h2>Contractor &amp; Resourcing Notes</h2>
              <div className="field"><textarea rows="2" value={resource.contractorNotes} onChange={e => setResource(prev => ({ ...prev, contractorNotes: e.target.value }))} /></div>
              <label>General Resource Notes</label>
              <div className="field"><textarea rows="2" value={resource.resourceNotes} onChange={e => setResource(prev => ({ ...prev, resourceNotes: e.target.value }))} /></div>
            </div>
          </React.Fragment>
        )}

        {tab === "import" && (
          <React.Fragment>
            <div className="card">
              <h2>Import Poles from Excel</h2>
              <p className="small">Upload an Excel (.xlsx) file with columns: PoleID, Location, Cluster, Category, Condition, Priority, EstimatedCost, Status, DateAssessed, Notes</p>
              <div className="flex">
                <button className="btn ghost" onClick={() => excelFileInputRef.current.click()}>Upload Excel file</button>
                <input type="file" accept=".xlsx,.xls" ref={excelFileInputRef} style={{ display: "none" }} onChange={importExcelFile} />
              </div>
            </div>
            <div className="card">
              <h2>Import Poles from CSV</h2>
              <div className="flex">
                <button className="btn ghost" onClick={downloadCSVTemplate}>Download CSV template</button>
                <button className="btn ghost" onClick={() => csvFileInputRef.current.click()}>Upload CSV file</button>
                <input type="file" accept=".csv" ref={csvFileInputRef} style={{ display: "none" }} onChange={importCSVFile} />
              </div>
              <div className="field" style={{ marginTop: "10px" }}>
                <label>Or paste CSV rows</label>
                <textarea rows="4" value={csvPasteText} onChange={e => setCsvPasteText(e.target.value)} placeholder="PoleID,Location,Cluster,Category,Condition,Priority,EstimatedCost,Status,DateAssessed,Notes" />
              </div>
              <button className="btn gold" disabled={!csvPasteText.trim()} onClick={importPasteCSV}>Import Pasted Rows</button>
              <p className="small" style={{ marginTop: "8px" }}>A real import automatically clears the placeholder example poles.</p>
            </div>
            <div className="card">
              <h2>Export</h2>
              <div className="flex">
                <button className="btn" onClick={exportPolesCSV}>Export Asset Register CSV</button>
              </div>
              <div className="flex" style={{ marginTop: "8px" }}>
                <button className="btn ghost" onClick={exportJSONBackup}>Download full backup (JSON)</button>
                <button className="btn ghost" onClick={() => jsonInputRef.current.click()}>Restore from backup (JSON)</button>
                <input type="file" accept="application/json" ref={jsonInputRef} style={{ display: "none" }} onChange={importJSONBackup} />
              </div>
              <p className="small" style={{ marginTop: "8px" }}>Data lives only in this browser's local storage. Download a JSON backup periodically — clearing browser data or switching computers will lose everything otherwise.</p>
            </div>
          </React.Fragment>
        )}

        {tab === "settings" && (
          <React.Fragment>
            <div className="unconfirmed-note">
              <b>Not yet confirmed with Neil:</b> the cluster target counts below come straight from the Zutari Conditional Report (June 2025) quoted in the Action Plan — Phase 1's own job is to verify them against a real GIS-based register. Treat these as a starting reference, not a final number.
            </div>
            <div className="card">
              <h2>Cluster Targets</h2>
              <p className="small">Used for the Cluster Coverage panel on the Dashboard and Priority &amp; Clusters tab.</p>
              {clusterTargets.map((t, i) => (
                <div className="grid cols-3" key={t.cluster} style={{ marginBottom: "6px" }}>
                  <div className="field"><label>Cluster</label><input type="text" value={t.cluster} disabled /></div>
                  <div className="field"><label>Low target</label><input type="number" value={t.low} onChange={e => updateClusterTarget(i, { low: Number(e.target.value) || 0 })} /></div>
                  <div className="field"><label>High target (blank = "+")</label><input type="number" value={t.high === null ? "" : t.high} onChange={e => updateClusterTarget(i, { high: e.target.value === "" ? null : Number(e.target.value) })} /></div>
                </div>
              ))}
            </div>
            <div className="card">
              <h2>AI Executive Summary — Style Notes</h2>
              <p className="small">Optional free-text notes applied to every generated executive summary (e.g. preferred sign-off, tone).</p>
              <div className="field"><textarea rows="2" value={summaryNotes} onChange={e => setSummaryNotes(e.target.value)} /></div>
            </div>
            <div className="card">
              <h2>Anthropic API (for Executive Summary Generation)</h2>
              <div className="field">
                <label>API Key</label>
                <input type="password" value={apiKey} onChange={e => setApiKey(sanitizeApiKey(e.target.value))} placeholder="sk-ant-..." />
                <p className="small">Pasted keys are cleaned automatically (stray spaces or invisible characters from copy/paste are stripped).</p>
              </div>
              <div className="field">
                <label>Model</label>
                <input type="text" value={model} onChange={e => setModel(e.target.value)} />
                <p className="small">Default is claude-sonnet-5. Update this if Anthropic renames or retires the model.</p>
              </div>
              <p className="small">Your key is stored only in this browser's local storage and sent directly to Anthropic's API — never through any other server, and never read from any .env file (this is a static HTML file with no server or build step).</p>
            </div>
          </React.Fragment>
        )}

        <p className="footer-note">Neil Arendse Toolkit — Totem Pole Refurbishment Tracker v1 · Data stored locally in this browser only.</p>
      </main>
      {showExcelPreview && (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) cancelExcelImport(); }}>
          <div className="modal wide">
            <button className="close-x" onClick={cancelExcelImport}>✕</button>
            <h3>Review Excel Poles</h3>
            <p className="small">{excelPreviewRows.length} pole{excelPreviewRows.length === 1 ? "" : "s"} found. Review below before importing.</p>
            <div style={{ maxHeight: "400px", overflowY: "auto", marginBottom: "12px" }}>
              <table style={{ fontSize: "12px" }}>
                <thead>
                  <tr>
                    <th>Pole ID</th><th>Location</th><th>Cluster</th><th>Category</th><th>Condition</th><th>Priority</th>
                  </tr>
                </thead>
                <tbody>
                  {excelPreviewRows.map((r, i) => (
                    <tr key={i}>
                      <td>{r.poleid || r.poleId || ""}</td>
                      <td>{r.location || ""}</td>
                      <td>{r.cluster || ""}</td>
                      <td>{r.category || ""}</td>
                      <td>{r.condition || ""}</td>
                      <td>{r.priority || ""}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="flex" style={{ justifyContent: "flex-end", gap: "8px" }}>
              <button className="btn ghost" onClick={cancelExcelImport}>Cancel</button>
              <button className="btn gold" onClick={confirmExcelImport}>Import {excelPreviewRows.length} Pole{excelPreviewRows.length === 1 ? "" : "s"}</button>
            </div>
          </div>
        </div>
      )}
      {showPoleForm && (
        <PoleForm
          initial={editingPole}
          onSave={savePole}
          onCancel={() => { setShowPoleForm(false); setEditingPole(null); }}
        />
      )}
      <PhotoLightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  // See CLAUDE.md CRITICAL LESSON for why this manual-transform pattern is used
  // instead of the automatic <script type="text/babel"> scan: babel-standalone's
  // default JSX runtime is "automatic", which injects an ES module import that
  // cannot execute in a plain script tag and silently fails to mount the app
  // (blank page, no visible error).
  (function () {
    var src = document.getElementById("app-source").textContent;
    try {
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      new Function(out)();
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div style="padding:24px;font-family:sans-serif;color:#B0413E;">' +
        '<h2>This tool failed to start</h2><p>' + (e && e.message ? e.message : e) +
        '</p><p style="color:#5B6B7A;font-size:13px;">Send this message to Matthew — it means something changed in how the browser runs this file.</p></div>';
    }
  })();
</script>
</body>
</html>
