<!DOCTYPE html>
<html lang="en">

<style>
  :root{
    --navy:#1A3A5C;
    --navy-dark:#122843;
    --gold:#C9A84C;
    --gold-dark:#B08F35;
    --slate:#F0F4F8;
    --white:#FAFBFD;
    --ink:#1C2733;
    --muted:#5B6B7A;
    --good:#2E7D4F;

    --bad:#B0413E;

  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--slate);color:var(--ink);}

  header.app-header p{margin:4px 0 0;font-size:12.5px;color:#CBD8E6;}
  .header-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .gold-badge{background:var(--gold);color:var(--navy-dark);font-weight:700;font-size:11px;padding:4px 10px;border-radius:999px;letter-spacing:0.3px;}
  .bad-badge{background:var(--bad);color:#fff;font-weight:700;font-size:11px;padding:4px 10px;border-radius:999px;letter-spacing:0.3px;}
  nav.tabs{display:flex;gap:4px;background:var(--navy-dark);padding:0 12px;overflow-x:auto;position:sticky;top:64px;z-index:19;}
  nav.tabs button{background:transparent;border:none;color:#B9C7D6;padding:12px 14px;font-size:13.5px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  nav.tabs button.active{color:var(--white);border-bottom:3px solid var(--gold);}
  main{max-width:1180px;margin:0 auto;padding:18px 14px 60px;}
  .card{background:var(--white);border-radius:12px;padding:18px;box-shadow:0 1px 3px rgba(20,40,60,0.08);margin-bottom:16px;border:1px solid #E2E9F0;}
  .card h2{margin-top:0;font-size:15px;color:var(--navy);}
  .grid{display:grid;gap:14px;}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .grid.cols-2{grid-template-columns:repeat(2,1fr);}
  .grid.qr-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  @media(max-width:760px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-2{grid-template-columns:1fr;}}

  .stat.alert{background:#FBEDEC;border-color:#F0C9C6;}

  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;color:#fff;}
  .badge.Operational{background:var(--good);}
  .badge.NeedsAttention{background:var(--warn);color:var(--navy-dark);}
  .badge.UnderRepair{background:var(--info);}
  .badge.Closed{background:var(--bad);}
  .badge.overdue{background:var(--bad);}
  .badge.ok{background:var(--good);}
  .badge.wo-Reported{background:var(--info);}
  .badge.wo-Logged{background:var(--muted);}
  .badge.wo-ContractorAssigned{background:var(--warn);color:var(--navy-dark);}
  .badge.wo-InProgress{background:var(--warn);color:var(--navy-dark);}
  .badge.wo-Resolved{background:var(--good);}
  .badge.wo-Closed{background:var(--good);}
  .badge.maint-overdue{background:var(--bad);}
  .badge.maint-soon{background:var(--warn);color:var(--navy-dark);}
  .badge.maint-ok{background:var(--good);}

  .sev-Medium{color:var(--warn);font-weight:700;}
  .sev-Low{color:var(--good);font-weight:700;}

<body>
<div id="root"></div>
<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, useRef } = React;

const STORAGE_KEY = "neil_facilities_monitoring_v2";
const OLD_STORAGE_KEY = "neil_facilities_monitoring_v1";
const DEFAULT_MODEL = "claude-sonnet-5";
const DEFAULT_OVERDUE_DAYS = 30;
const WO_STATUSES = ["Reported", "Logged", "Contractor Assigned", "In Progress", "Resolved", "Closed"];
const WAITING_ON_OPTIONS = ["", "Water & Sanitation", "Eskom", "SAPS", "Roads Dept", "Other"];
const CLOSED_STATUSES = ["Resolved", "Closed"];
const DUPLICATE_THRESHOLD = 0.4;
// Internal staff (Facility Officers, Technical Assistants, Superintendents) are Neil's own
// City of Cape Town team, tracked separately from the Monitoring Officials — those are staffed
// through an external tender operator, not directly managed by Neil the same way.
const INTERNAL_STAFF_ROLES = ["Facility Officer", "Technical Assistant", "Superintendent"];
// When a facility's status is changed to "Under Repair", the inspection-frequency override
// auto-suggests this tighter check-in cadence (still editable/clearable) instead of the
// default 30-day threshold — facilities under active repair need closer attention.
const UNDER_REPAIR_SUGGESTED_FREQUENCY = 7;

function uid() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return "id-" + Math.random().toString(36).slice(2) + Date.now();
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function nowStamp() {
  return new Date().toISOString();
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const then = new Date(dateStr + "T00:00:00");
  if (isNaN(then.getTime())) return null;
  const diffMs = Date.now() - then.getTime();
  return Math.floor(diffMs / (1000 * 60 * 60 * 24));
}

function generateWONumber() {
  const digits = Math.floor(100000 + Math.random() * 900000);
  return "TFMS-WO" + digits;
}

const DEMO_OFFICIALS = ["J. Petersen", "M. Adams", "S. Nkosi", "F. Davids"];
// Contractors are now { name, parent } objects — parent is "" for a primary/top-level
// provider, or another contractor's name if it's a sub-contractor working under them.
// This reflects the real structure Neil described: one integrated FM service provider
// (AFMS) who in turn uses smaller sub-contractors where they lack in-house capacity.
const DEMO_CONTRACTORS = [
  { name: "AFMS", parent: "" },
  { name: "Cape Electrical CC", parent: "AFMS" },
  { name: "BlueDot Plumbing", parent: "AFMS" }
];
const DEMO_INTERNAL_STAFF = [
  { name: "T. Fortuin", role: "Superintendent" },
  { name: "L. Meyer", role: "Facility Officer" },
  { name: "R. Isaacs", role: "Technical Assistant" }
];

// Older saved data (or a JSON backup from before this feature) may have knownContractors
// as a flat array of name strings. Normalize to {name, parent} objects so the rest of the
// app can rely on one consistent shape without a hard storage-key migration.
function normalizeContractors(list) {
  return (list || []).map(c => (typeof c === "string" ? { name: c, parent: "" } : { name: c.name, parent: c.parent || "" }));
}

// Example data shown on the very first open so the tool isn't a blank shell.
// Every seeded facility carries `_demo: true` so it can be cleared in one click
// without touching anything the user has entered themselves. Dates are computed
// relative to today so the examples always look current.
function demoSeed() {
  function daysAgoStr(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString().slice(0, 10);
  }
  function stamp(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString();
  }
  return {
    officials: DEMO_OFFICIALS.slice(),
    knownContractors: DEMO_CONTRACTORS.map(c => ({ ...c })),
    internalStaff: DEMO_INTERNAL_STAFF.map(s => ({ ...s })),
    facilities: [
      {
        id: uid(), _demo: true, name: "Wynberg Taxi Rank", official: "J. Petersen",
        internalStaffName: "L. Meyer", inspectionFrequencyDays: null,
        status: "Needs Attention", lastInspected: daysAgoStr(41), photo: null,
        notes: "High foot traffic; roof leak reported in bay 3.",
        issues: [{
          id: uid(), woNumber: generateWONumber(),
          description: "Broken lighting in main shelter — commuters report it's dark at night",
          severity: "High", status: "In Progress", contractor: "Cape Electrical CC", waitingOn: "Eskom",
          photo: null, dateReported: daysAgoStr(12), dateResolved: null,
          activity: [
            { date: stamp(12), note: "Work order logged (Reported)" },
            { date: stamp(9), note: "Status changed to Contractor Assigned" },
            { date: stamp(6), note: "Status changed to In Progress" }
          ]
        }],
        maintenanceTasks: [
          { id: uid(), name: "Service fire extinguishers", frequencyDays: 180, lastCompleted: daysAgoStr(200) }
        ]
      },
      {
        id: uid(), _demo: true, name: "Bellville Public Transport Interchange", official: "M. Adams",
        internalStaffName: "T. Fortuin", inspectionFrequencyDays: null,
        status: "Operational", lastInspected: daysAgoStr(8), photo: null, notes: "",
        issues: [],
        maintenanceTasks: [
          { id: uid(), name: "Clean stormwater drains", frequencyDays: 90, lastCompleted: daysAgoStr(30) }
        ]
      },
      {
        id: uid(), _demo: true, name: "Mitchells Plain PTI", official: "S. Nkosi",
        internalStaffName: "R. Isaacs",
        // Example of the per-facility inspection-frequency override: this facility is Under
        // Repair, so it's checked every 7 days instead of the global 30-day default.
        inspectionFrequencyDays: UNDER_REPAIR_SUGGESTED_FREQUENCY,
        status: "Under Repair", lastInspected: daysAgoStr(20), photo: null,
        notes: "Ablution block refurbishment underway.",
        issues: [{
          id: uid(), woNumber: generateWONumber(),
          description: "Blocked toilets in ablution block",
          severity: "Medium", status: "Contractor Assigned", contractor: "BlueDot Plumbing", waitingOn: "",
          photo: null, dateReported: daysAgoStr(5), dateResolved: null,
          activity: [
            { date: stamp(5), note: "Work order logged (Reported)" },
            { date: stamp(3), note: "Status changed to Contractor Assigned" }
          ]
        }],
        maintenanceTasks: []
      },
      {
        id: uid(), _demo: true, name: "Khayelitsha Site B Taxi Rank", official: "F. Davids",
        internalStaffName: "", inspectionFrequencyDays: null,
        status: "Operational", lastInspected: daysAgoStr(55), photo: null, notes: "",
        issues: [], maintenanceTasks: []
      },
      {
        id: uid(), _demo: true, name: "Nyanga Terminus", official: "J. Petersen",
        internalStaffName: "", inspectionFrequencyDays: null,
        status: "Operational", lastInspected: "", photo: null,
        notes: "Newly added — inspection pending.",
        issues: [], maintenanceTasks: []
      }
    ]
  };
}

function loadState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // Migrate from the v1 key transparently so an existing returning user doesn't lose data
      // just because a session added work orders and maintenance tracking.
      raw = localStorage.getItem(OLD_STORAGE_KEY);
    }
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Normalize knownContractors in case this is data saved before the AFMS/sub-contractor
    // hierarchy feature existed (flat array of name strings) — no storage-key bump needed.
    if (data && data.knownContractors) data.knownContractors = normalizeContractors(data.knownContractors);
    return data;
  } catch (e) {
    console.error("Failed to load saved state", e);
    return null;
  }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error("Failed to save state", e);
  }
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if (lines.length === 0) return [];
  const parseLine = (line) => {
    const out = [];
    let cur = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        out.push(cur);
        cur = "";
      } else {
        cur += ch;
      }
    }
    out.push(cur);
    return out.map(s => s.trim());
  };
  const header = parseLine(lines[0]).map(h => h.toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = parseLine(lines[i]);
    const rec = {};
    header.forEach((h, idx) => { rec[h] = cells[idx] !== undefined ? cells[idx] : ""; });
    rows.push(rec);
  }
  return rows;
}

// Neil said he'd send an Excel list of facilities — parse .xlsx/.xls client-side via the
// SheetJS library and convert the first sheet to CSV text, so it flows through the exact
// same review-then-import path as a pasted/typed CSV. Returns null if parsing fails.
function parseExcelToCSVText(arrayBuffer) {
  try {
    if (typeof XLSX === "undefined") return null;
    const workbook = XLSX.read(arrayBuffer, { type: "array" });
    const firstSheetName = workbook.SheetNames[0];
    if (!firstSheetName) return null;
    const sheet = workbook.Sheets[firstSheetName];
    return XLSX.utils.sheet_to_csv(sheet);
  } catch (e) {
    console.error("Failed to parse Excel file", e);
    return null;
  }
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toCSVValue(v) {
  if (v === undefined || v === null) return "";
  const s = String(v);
  if (s.includes(",") || s.includes('"') || s.includes("\n")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

// Resize an image client-side before storing it as a data URL, so a handful of
// phone photos per facility doesn't blow past localStorage's ~5-10MB quota.
function resizeImageFile(file, maxDim, callback) {
  try {
    const reader = new FileReader();
    reader.onload = (evt) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        callback(canvas.toDataURL("image/jpeg", 0.75));
      };
      img.onerror = () => callback(null);
      img.src = evt.target.result;
    };
    reader.onerror = () => callback(null);
    reader.readAsDataURL(file);
  } catch (e) {
    callback(null);
  }
}

async function callClaude(apiKey, model, prompt) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: model,
      max_tokens: 500,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error("API error " + resp.status + ": " + errText.slice(0, 300));
  }
  const data = await resp.json();
  const text = (data.content && data.content[0] && data.content[0].text) || "";
  return text;
}

function computeNextDue(task) {
  if (!task.lastCompleted) return null;
  const d = new Date(task.lastCompleted + "T00:00:00");
  d.setDate(d.getDate() + Number(task.frequencyDays || 0));
  return d.toISOString().slice(0, 10);
}

function maintenanceStatus(task) {
  const nextDue = computeNextDue(task);
  if (!nextDue) return { label: "Never done", cls: "maint-overdue", overdue: true, daysUntil: -9999 };
  const daysUntil = Math.floor((new Date(nextDue + "T00:00:00").getTime() - new Date(todayStr() + "T00:00:00").getTime()) / (1000 * 60 * 60 * 24));
  if (daysUntil < 0) return { label: Math.abs(daysUntil) + "d overdue", cls: "maint-overdue", overdue: true, daysUntil };
  if (daysUntil <= 14) return { label: "due in " + daysUntil + "d", cls: "maint-soon", overdue: false, daysUntil };
  return { label: "due in " + daysUntil + "d", cls: "maint-ok", overdue: false, daysUntil };
}

// --- Duplicate-report detection: crude but effective word-overlap similarity ---
function wordsOf(s) {
  return new Set((s || "").toLowerCase().replace(/[^a-z0-9 ]+/g, " ").split(/\s+/).filter(Boolean));
}
function similarity(a, b) {
  const wa = wordsOf(a), wb = wordsOf(b);
  if (wa.size === 0 || wb.size === 0) return 0;
  let inter = 0;
  wa.forEach(w => { if (wb.has(w)) inter++; });
  const union = new Set([...wa, ...wb]).size;
  return union === 0 ? 0 : inter / union;
}
function findLikelyDuplicate(facility, description) {
  const openWOs = (facility.issues || []).filter(w => !CLOSED_STATUSES.includes(w.status));
  let best = null, bestScore = 0;
  openWOs.forEach(w => {
    const score = similarity(w.description, description);
    if (score > bestScore) { bestScore = score; best = w; }
  });
  return bestScore >= DUPLICATE_THRESHOLD ? best : null;
}

// --- WhatsApp quick-log facility guesser: does any known facility name appear in the pasted text? ---
function guessFacilityFromText(text, facilities) {
  if (!text) return "";
  const lower = text.toLowerCase();
  const match = facilities.find(f => f.name && lower.includes(f.name.toLowerCase()));
  return match ? match.id : "";
}

function App() {
  const saved = loadState();
  // First-ever open (nothing saved yet): start with example data so the tool isn't
  // an empty shell. Everything seeded is flagged _demo and clears in one click.
  const seed = saved || demoSeed();
  const [facilities, setFacilities] = useState(seed.facilities || []);
  const [officials, setOfficials] = useState(seed.officials || []);
  const [internalStaff, setInternalStaff] = useState(seed.internalStaff || []);
  const [knownContractors, setKnownContractors] = useState(normalizeContractors(seed.knownContractors));
  const [overdueDays, setOverdueDays] = useState(saved && saved.overdueDays !== undefined ? saved.overdueDays : DEFAULT_OVERDUE_DAYS);
  const [apiKey, setApiKey] = useState(saved && saved.apiKey ? saved.apiKey : "");

  const [briefing, setBriefing] = useState(saved && saved.briefing ? saved.briefing : "");
  const [briefingAt, setBriefingAt] = useState(saved && saved.briefingAt ? saved.briefingAt : "");

  const [tab, setTab] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [filterOfficial, setFilterOfficial] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [overdueOnly, setOverdueOnly] = useState(false);
  const [editing, setEditing] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [woFor, setWoFor] = useState(null);
  const [editingWO, setEditingWO] = useState(null);
  const [woPrefillDescription, setWoPrefillDescription] = useState("");
  const [showMaintForm, setShowMaintForm] = useState(false);
  const [newOfficial, setNewOfficial] = useState("");
  const [newInternalStaffName, setNewInternalStaffName] = useState("");
  const [newInternalStaffRole, setNewInternalStaffRole] = useState(INTERNAL_STAFF_ROLES[0]);
  const [newContractor, setNewContractor] = useState("");
  const [newContractorParent, setNewContractorParent] = useState("");
  const [csvText, setCsvText] = useState("");
  const [maintSearch, setMaintSearch] = useState("");
  const [quickLogText, setQuickLogText] = useState("");
  const [quickLogFacilityId, setQuickLogFacilityId] = useState("");
  const [briefBusy, setBriefBusy] = useState(false);
  const [lightbox, setLightbox] = useState(null);
  const [quickFacilityId, setQuickFacilityId] = useState(null);
  const jsonInputRef = useRef(null);
  const plannerInputRef = useRef(null);
  const csvInputRef = useRef(null);

  useEffect(() => {
    saveState({ facilities, officials, internalStaff, knownContractors, overdueDays, apiKey, model, briefing, briefingAt });
  }, [facilities, officials, internalStaff, knownContractors, overdueDays, apiKey, model, briefing, briefingAt]);

  // Deep-link support: a QR code (or any bookmarked link) can jump straight to a
  // single facility's quick-action screen via a #facility=<id> hash fragment.
  useEffect(() => {
    function applyHash() {
      const m = window.location.hash.match(/facility=([^&]+)/);
      setQuickFacilityId(m ? decodeURIComponent(m[1]) : null);
    }
    applyHash();
    window.addEventListener("hashchange", applyHash);
    return () => window.removeEventListener("hashchange", applyHash);
  }, []);

  const enriched = useMemo(() => {
    return facilities.map(f => {
      const days = daysSince(f.lastInspected);
      // A facility with its own inspection-frequency override (e.g. tightened to 7d while
      // Under Repair) uses that instead of the global threshold for its overdue calculation.
      const effectiveThreshold = f.inspectionFrequencyDays && f.inspectionFrequencyDays > 0 ? f.inspectionFrequencyDays : overdueDays;
      const overdue = days === null || days > effectiveThreshold;
      const workOrders = f.issues || [];
      const openWOs = workOrders.filter(w => !CLOSED_STATUSES.includes(w.status));
      const maintenanceTasks = f.maintenanceTasks || [];
      const overdueMaint = maintenanceTasks.filter(t => maintenanceStatus(t).overdue);
      return { ...f, daysSinceInspection: days, effectiveThreshold, overdue, workOrders, openWOs, openIssueCount: openWOs.length, maintenanceTasks, overdueMaintCount: overdueMaint.length };
    });
  }, [facilities, overdueDays]);

  const filtered = useMemo(() => {
    return enriched.filter(f => {
      if (search && !f.name.toLowerCase().includes(search.toLowerCase())) return false;
      if (filterOfficial && f.official !== filterOfficial) return false;
      if (filterStatus && f.status !== filterStatus) return false;
      if (overdueOnly && !f.overdue) return false;
      return true;
    }).sort((a, b) => (b.overdue === a.overdue ? b.openIssueCount - a.openIssueCount : (b.overdue ? 1 : -1)));
  }, [enriched, search, filterOfficial, filterStatus, overdueOnly]);

  const summary = useMemo(() => {
    const overdueCount = enriched.filter(f => f.overdue).length;
    const needsAttention = enriched.filter(f => f.status !== "Operational").length;
    const openWOTotal = enriched.reduce((sum, f) => sum + f.openWOs.length, 0);
    const highSeverityOpen = enriched.reduce((sum, f) => sum + f.openWOs.filter(w => w.severity === "High").length, 0);
    const maintOverdueTotal = enriched.reduce((sum, f) => sum + f.overdueMaintCount, 0);
    return { total: enriched.length, overdueCount, needsAttention, openWOTotal, highSeverityOpen, maintOverdueTotal };
  }, [enriched]);

  const workload = useMemo(() => {
    const map = {};
    officials.forEach(o => { map[o] = { total: 0, overdue: 0 }; });
    enriched.forEach(f => {
      const key = f.official || "Unassigned";
      if (!map[key]) map[key] = { total: 0, overdue: 0 };
      map[key].total += 1;
      if (f.overdue) map[key].overdue += 1;
    });
    return Object.entries(map).sort((a, b) => b[1].total - a[1].total);
  }, [officials, enriched]);

  const maxWorkload = Math.max(1, ...workload.map(([, v]) => v.total));

  // Mirrors the Monitoring Officials workload view, but for Neil's own internal team
  // (Facility Officers, Technical Assistants, Superintendents) — kept as a separate list
  // since these are two different reporting lines (external tender operator vs internal staff).
  const workloadInternal = useMemo(() => {
    const map = {};
    internalStaff.forEach(s => { map[s.name] = { total: 0, overdue: 0, role: s.role }; });
    enriched.forEach(f => {
      const key = f.internalStaffName;
      if (!key) return;
      if (!map[key]) map[key] = { total: 0, overdue: 0, role: "" };
      map[key].total += 1;
      if (f.overdue) map[key].overdue += 1;
    });
    return Object.entries(map).sort((a, b) => b[1].total - a[1].total);
  }, [internalStaff, enriched]);

  const maxWorkloadInternal = Math.max(1, ...workloadInternal.map(([, v]) => v.total));

  const allMaintenanceTasks = useMemo(() => {
    return enriched.flatMap(f => (f.maintenanceTasks || []).map(t => ({ ...t, facilityId: f.id, facilityName: f.name, status: maintenanceStatus(t) })))
      .sort((a, b) => a.status.daysUntil - b.status.daysUntil);
  }, [enriched]);

  const contractorStats = useMemo(() => {
    const map = {};
    enriched.forEach(f => (f.workOrders || []).forEach(w => {
      const name = (w.contractor || "").trim();
      if (!name) return;
      if (!map[name]) map[name] = { total: 0, open: 0, resolved: 0, totalDays: 0, withDays: 0 };
      map[name].total += 1;
      if (CLOSED_STATUSES.includes(w.status)) {
        map[name].resolved += 1;
        if (w.dateReported && w.dateResolved) {
          const days = Math.max(0, Math.round((new Date(w.dateResolved) - new Date(w.dateReported)) / 86400000));
          map[name].totalDays += days;
          map[name].withDays += 1;
        }
      } else {
        map[name].open += 1;
      }
    }));
    const parentOf = {};
    knownContractors.forEach(c => { parentOf[c.name] = c.parent || ""; });
    return Object.entries(map).map(([name, v]) => ({
      name, total: v.total, open: v.open, resolved: v.resolved, parent: parentOf[name] || "",
      avgDays: v.withDays > 0 ? Math.round(v.totalDays / v.withDays) : null
    })).sort((a, b) => b.total - a.total);
  }, [enriched, knownContractors]);

  const contractorOptions = useMemo(() => {
    const seen = new Set(knownContractors.map(c => c.name));
    enriched.forEach(f => (f.workOrders || []).forEach(w => { if (w.contractor) seen.add(w.contractor); }));
    return Array.from(seen).filter(Boolean).sort();
  }, [knownContractors, enriched]);

  // Two-level hierarchy only (primary provider -> sub-contractors), matching the real
  // structure Neil described: AFMS as the one integrated FM service provider, with smaller
  // sub-contractors underneath where they lack in-house capacity.
  const contractorHierarchy = useMemo(() => {
    const topLevel = knownContractors.filter(c => !c.parent);
    return topLevel.map(top => ({
      ...top,
      children: knownContractors.filter(c => c.parent === top.name)
    }));
  }, [knownContractors]);

  const suggestedFacilityId = useMemo(() => guessFacilityFromText(quickLogText, facilities), [quickLogText, facilities]);

  const hasDemo = useMemo(() => facilities.some(f => f._demo), [facilities]);

  // Remove only the seeded example data, preserving anything the user has added,
  // and drop the demo-provided officials/contractors that are no longer referenced.
  function clearDemoData() {
    if (!window.confirm("Clear the example data and start fresh?\n\nThis removes the sample facilities so you can enter your real ones. Anything you've already added yourself is kept.")) return;
    const real = facilities.filter(f => !f._demo);
    const usedOfficials = new Set(real.map(f => f.official).filter(Boolean));
    const usedInternalStaff = new Set(real.map(f => f.internalStaffName).filter(Boolean));
    const usedContractors = new Set(real.flatMap(f => (f.issues || []).map(w => w.contractor).filter(Boolean)));
    const demoContractorNames = new Set(DEMO_CONTRACTORS.map(c => c.name));
    const demoInternalStaffNames = new Set(DEMO_INTERNAL_STAFF.map(s => s.name));
    setFacilities(real);
    setOfficials(prev => prev.filter(o => !DEMO_OFFICIALS.includes(o) || usedOfficials.has(o)));
    setInternalStaff(prev => prev.filter(s => !demoInternalStaffNames.has(s.name) || usedInternalStaff.has(s.name)));
    setKnownContractors(prev => prev.filter(c => !demoContractorNames.has(c.name) || usedContractors.has(c.name)));
    setBriefing("");
    setBriefingAt("");
  }

  // When bulk-importing real facilities, drop the seeded examples first so the
  // user's data replaces them rather than sitting mixed in alongside.
  function withoutDemo(list) {
    return list.filter(f => !f._demo);
  }

  function saveFacility(f) {
    setFacilities(prev => {
      const exists = prev.some(p => p.id === f.id);
      if (exists) return prev.map(p => p.id === f.id ? f : p);
      return [...prev, { ...f, issues: f.issues || [], maintenanceTasks: f.maintenanceTasks || [] }];
    });
    setShowForm(false);
    setEditing(null);
  }

  function deleteFacility(id) {
    if (!window.confirm("Delete this facility? This cannot be undone.")) return;
    setFacilities(prev => prev.filter(f => f.id !== id));
  }

  function logInspection(facilityId) {
    setFacilities(prev => prev.map(f => f.id === facilityId ? { ...f, lastInspected: todayStr() } : f));
  }

  function saveWorkOrder(facilityId, wo, isEdit) {
    const facility = facilities.find(f => f.id === facilityId);
    if (!isEdit && facility) {
      const dup = findLikelyDuplicate(facility, wo.description);
      if (dup) {
        const proceed = window.confirm(
          `This looks similar to an existing open work order ${dup.woNumber}: "${dup.description}"\n\nLog this as a new, separate work order anyway?`
        );
        if (!proceed) return false;
      }
    }
    setFacilities(prev => prev.map(f => {
      if (f.id !== facilityId) return f;
      const list = f.issues || [];
      if (isEdit) {
        return { ...f, issues: list.map(w => w.id === wo.id ? wo : w) };
      }
      const withActivity = { ...wo, activity: [{ date: nowStamp(), note: "Work order logged (" + wo.status + ")" }] };
      return { ...f, issues: [...list, withActivity] };
    }));
    setWoFor(null);
    setEditingWO(null);
    setWoPrefillDescription("");
    setQuickLogText("");
    setQuickLogFacilityId("");
    return true;
  }

  function updateWOStatus(facilityId, woId, newStatus) {
    setFacilities(prev => prev.map(f => {
      if (f.id !== facilityId) return f;
      return {
        ...f, issues: (f.issues || []).map(w => w.id === woId ? {
          ...w, status: newStatus,
          dateResolved: CLOSED_STATUSES.includes(newStatus) ? todayStr() : w.dateResolved,
          activity: [...(w.activity || []), { date: nowStamp(), note: "Status changed to " + newStatus }]
        } : w)
      };
    }));
  }

  function deleteWorkOrder(facilityId, woId) {
    if (!window.confirm("Delete this work order? This cannot be undone.")) return;
    setFacilities(prev => prev.map(f => f.id === facilityId ? { ...f, issues: (f.issues || []).filter(w => w.id !== woId) } : f));
  }

  function startQuickLogWorkOrder() {
    const facilityId = quickLogFacilityId || suggestedFacilityId;
    if (!facilityId) { alert("Pick which facility this is about first (the suggestion box couldn't match one automatically)."); return; }
    setWoPrefillDescription(quickLogText.trim());
    setEditingWO(null);
    setWoFor(facilityId);
  }

  function addMaintenanceTask(facilityId, task) {
    setFacilities(prev => prev.map(f => f.id === facilityId ? { ...f, maintenanceTasks: [...(f.maintenanceTasks || []), task] } : f));
    setShowMaintForm(false);
  }

  function markMaintenanceDone(facilityId, taskId) {
    setFacilities(prev => prev.map(f => {
      if (f.id !== facilityId) return f;
      return { ...f, maintenanceTasks: (f.maintenanceTasks || []).map(t => t.id === taskId ? { ...t, lastCompleted: todayStr() } : t) };
    }));
  }

  function deleteMaintenanceTask(facilityId, taskId) {
    if (!window.confirm("Delete this maintenance task?")) return;
    setFacilities(prev => prev.map(f => f.id === facilityId ? { ...f, maintenanceTasks: (f.maintenanceTasks || []).filter(t => t.id !== taskId) } : f));
  }

  function addOfficial() {
    const name = newOfficial.trim();
    if (!name || officials.includes(name)) return;
    setOfficials(prev => [...prev, name]);
    setNewOfficial("");
  }

  function removeOfficial(name) {
    setOfficials(prev => prev.filter(o => o !== name));
  }

  function addInternalStaff() {
    const name = newInternalStaffName.trim();
    if (!name || internalStaff.some(s => s.name === name)) return;
    setInternalStaff(prev => [...prev, { name, role: newInternalStaffRole }]);
    setNewInternalStaffName("");
  }

  function removeInternalStaff(name) {
    setInternalStaff(prev => prev.filter(s => s.name !== name));
  }

  function addContractor() {
    const name = newContractor.trim();
    if (!name || knownContractors.some(c => c.name === name)) return;
    setKnownContractors(prev => [...prev, { name, parent: newContractorParent || "" }]);
    setNewContractor("");
    setNewContractorParent("");
  }

  // If the removed contractor had sub-contractors under it, reparent them to top-level
  // rather than silently orphaning the relationship or blocking the delete.
  function removeContractor(name) {
    setKnownContractors(prev => prev
      .filter(c => c.name !== name)
      .map(c => c.parent === name ? { ...c, parent: "" } : c));
  }

  function handleImportCSV() {
    const rows = parseCSV(csvText);
    if (rows.length === 0) { alert("No rows found. Header row should be: name,official,internalstaff,status,lastinspected,inspectionfrequencydays,notes"); return; }
    const imported = rows.map(r => ({
      id: uid(),
      name: r.name || r.facility || "Unnamed facility",
      official: r.official || "",
      internalStaffName: r.internalstaff || r["internal staff"] || "",
      status: r.status || "Operational",
      lastInspected: r.lastinspected || r["last inspected"] || "",
      inspectionFrequencyDays: r.inspectionfrequencydays ? Number(r.inspectionfrequencydays) : null,
      notes: r.notes || "",
      issues: [],
      maintenanceTasks: []
    }));
    setFacilities(prev => [...withoutDemo(prev), ...imported]);
    const newOfficials = Array.from(new Set(imported.map(f => f.official).filter(Boolean)));
    setOfficials(prev => Array.from(new Set([...prev, ...newOfficials])));
    const newStaffNames = Array.from(new Set(imported.map(f => f.internalStaffName).filter(Boolean)));
    setInternalStaff(prev => {
      const existingNames = new Set(prev.map(s => s.name));
      const additions = newStaffNames.filter(n => !existingNames.has(n)).map(n => ({ name: n, role: INTERNAL_STAFF_ROLES[0] }));
      return [...prev, ...additions];
    });
    setCsvText("");
    alert(`Imported ${imported.length} facilities.`);
  }

  // Read a .csv OR .xlsx/.xls file the user picked and drop the resulting CSV text into the
  // paste box so they can eyeball it before committing the import. Neil said he'd send an
  // Excel list, so .xlsx/.xls go through SheetJS first and land in the exact same review path.
  function handleCSVFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const isExcel = /\.xlsx$|\.xls$/i.test(file.name);
    const reader = new FileReader();
    if (isExcel) {
      reader.onload = (evt) => {
        const csv = parseExcelToCSVText(evt.target.result);
        if (csv === null) { alert("Could not read that Excel file. Try saving it as .csv and uploading that instead."); return; }
        setCsvText(csv);
      };
      reader.onerror = () => alert("Could not read that file.");
      reader.readAsArrayBuffer(file);
    } else {
      reader.onload = (evt) => { setCsvText(evt.target.result || ""); };
      reader.onerror = () => alert("Could not read that file.");
      reader.readAsText(file);
    }
    e.target.value = "";
  }

  // A ready-made CSV Neil can open in Excel/Sheets, fill in, and upload back.
  function downloadCSVTemplate() {
    const content = "name,official,internalstaff,status,lastinspected,inspectionfrequencydays,notes\n"
      + "Wynberg Taxi Rank,J. Petersen,L. Meyer,Operational,2026-06-15,,Roof leaking in bay 3\n"
      + "Bellville PTI,M. Adams,T. Fortuin,Needs Attention,2026-05-30,,Awaiting contractor callout\n"
      + "Mitchells Plain PTI,S. Nkosi,R. Isaacs,Under Repair,2026-06-25,7,Ablution block refurbishment underway\n";
    downloadFile("facilities_template.csv", content, "text/csv");
  }

  function importPlannerBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!data || !Array.isArray(data.facilities)) { alert("That doesn't look like a Facilities Rationalisation Planner backup file."); return; }
        if (!window.confirm(`Import ${data.facilities.length} facilities from the Rationalisation Planner backup? This adds them alongside anything already here (it won't overwrite existing entries).`)) return;
        const imported = data.facilities.map(f => ({
          id: uid(),
          name: f.name || "Unnamed facility",
          official: f.official || "",
          status: "Operational",
          lastInspected: "",
          notes: f.notes || "",
          issues: [],
          maintenanceTasks: []
        }));
        setFacilities(prev => [...withoutDemo(prev), ...imported]);
        const newOfficials = Array.from(new Set(imported.map(f => f.official).filter(Boolean)));
        setOfficials(prev => Array.from(new Set([...prev, ...(data.officials || []), ...newOfficials])));
        alert(`Imported ${imported.length} facilities from the Planner. New facilities start as "Operational" with no inspection date — log an inspection to set a real baseline.`);
      } catch (err) {
        alert("Could not read that file — is it a valid Planner backup JSON?");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function exportCSV() {
    const header = ["Name", "Official", "InternalStaff", "Status", "LastInspected", "InspectionFrequencyDays", "DaysSinceInspection", "Overdue", "OpenWorkOrders", "OverdueMaintenance", "Notes"];
    const lines = [header.join(",")];
    enriched.forEach(f => {
      lines.push([
        toCSVValue(f.name), toCSVValue(f.official), toCSVValue(f.internalStaffName || ""), toCSVValue(f.status), toCSVValue(f.lastInspected || "never"),
        f.inspectionFrequencyDays || "", f.daysSinceInspection === null ? "never" : f.daysSinceInspection, f.overdue ? "YES" : "no", f.openWOs.length, f.overdueMaintCount, toCSVValue(f.notes || "")
      ].join(","));
    });
    downloadFile("facilities_monitoring_" + todayStr() + ".csv", lines.join("\n"), "text/csv");
  }

  function exportWorkOrdersCSV() {
    const header = ["Facility", "WONumber", "Status", "Severity", "Contractor", "WaitingOn", "DateReported", "DateResolved", "Description"];
    const lines = [header.join(",")];
    enriched.forEach(f => {
      (f.workOrders || []).forEach(w => {
        lines.push([
          toCSVValue(f.name), toCSVValue(w.woNumber), toCSVValue(w.status), toCSVValue(w.severity), toCSVValue(w.contractor || ""),
          toCSVValue(w.waitingOn || ""), toCSVValue(w.dateReported), toCSVValue(w.dateResolved || ""), toCSVValue(w.description)
        ].join(","));
      });
    });
    downloadFile("work_orders_" + todayStr() + ".csv", lines.join("\n"), "text/csv");
  }

  function exportMaintenanceCSV() {
    const header = ["Facility", "Task", "FrequencyDays", "LastCompleted", "NextDue", "StatusLabel"];
    const lines = [header.join(",")];
    allMaintenanceTasks.forEach(t => {
      lines.push([
        toCSVValue(t.facilityName), toCSVValue(t.name), t.frequencyDays, toCSVValue(t.lastCompleted || "never"),
        toCSVValue(computeNextDue(t) || ""), toCSVValue(t.status.label)
      ].join(","));
    });
    downloadFile("maintenance_schedule_" + todayStr() + ".csv", lines.join("\n"), "text/csv");
  }

  function exportJSONBackup() {
    const payload = { facilities, officials, internalStaff, knownContractors, overdueDays, model, exportedAt: new Date().toISOString() };
    downloadFile("facilities_monitoring_backup_" + todayStr() + ".json", JSON.stringify(payload, null, 2), "application/json");
  }

  function importJSONBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!window.confirm("This will replace all current facilities and settings with the backup file. Continue?")) return;
        setFacilities(data.facilities || []);
        setOfficials(data.officials || []);
        setInternalStaff(data.internalStaff || []);
        setKnownContractors(normalizeContractors(data.knownContractors));
        setOverdueDays(data.overdueDays !== undefined ? data.overdueDays : DEFAULT_OVERDUE_DAYS);
        if (data.model) setModel(data.model);
        alert("Backup restored.");
      } catch (err) {
        alert("Could not read that file — is it a valid backup JSON?");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  async function generateBriefing() {
    if (!apiKey) { alert("Add your Anthropic API key in Settings first."); setTab("settings"); return; }
    setBriefBusy(true);
    try {
      const overdueList = enriched.filter(f => f.overdue).slice(0, 25).map(f => `${f.name} (official: ${f.official || "unassigned"}, ${f.daysSinceInspection === null ? "never inspected" : f.daysSinceInspection + " days since last inspection"})`).join("; ");
      const highWOs = enriched.flatMap(f => f.openWOs.filter(w => w.severity === "High").map(w => `${f.name} (${w.woNumber}): ${w.description}`)).slice(0, 15).join("; ");
      const overdueMaint = enriched.flatMap(f => (f.maintenanceTasks || []).filter(t => maintenanceStatus(t).overdue).map(t => `${f.name}: ${t.name}`)).slice(0, 15).join("; ");
      const prompt = `You are briefing a Senior Manager at the City of Cape Town (Public Transportation Facilities Management) at the start of their day. Give a short, prioritized, plain-language briefing (4-6 sentences, no headings, no bullet points) covering what most needs attention today.

Total facilities monitored: ${summary.total}
Facilities overdue for inspection (over ${overdueDays} days or never inspected): ${summary.overdueCount}
Overdue facility details: ${overdueList || "none"}
Facilities not in "Operational" status: ${summary.needsAttention}
Total open work orders: ${summary.openWOTotal}, of which high severity: ${summary.highSeverityOpen}
High severity work order details: ${highWOs || "none"}
Overdue preventative maintenance tasks: ${summary.maintOverdueTotal}
Overdue maintenance details: ${overdueMaint || "none"}

Write the briefing directly, as if speaking to the manager, prioritizing the most urgent items first.`;
      const raw = await callClaude(apiKey, model, prompt);
      setBriefing(raw.trim());
      setBriefingAt(new Date().toISOString());
    } catch (e) {
      alert("Briefing generation failed: " + e.message);
    } finally {
      setBriefBusy(false);
    }
  }

            <div className="card">
              <h2>Quick-Log from WhatsApp</h2>
              <p className="small">Paste the raw forwarded message text — the tool tries to spot which facility it's about and pre-fills a work order for you to check before saving.</p>
              <div className="field">
                <textarea rows="4" value={quickLogText} onChange={e => setQuickLogText(e.target.value)} placeholder="Paste the forwarded WhatsApp message here..." />
              </div>
              <div className="grid cols-2">
                <div className="field">
                  <label>Facility {suggestedFacilityId && !quickLogFacilityId ? "(auto-detected)" : ""}</label>
                  <select value={quickLogFacilityId || suggestedFacilityId} onChange={e => setQuickLogFacilityId(e.target.value)}>
                    <option value="">Choose a facility...</option>
                    {facilities.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>
                </div>
                <div className="field" style={{ display: "flex", alignItems: "flex-end" }}>
                  <button className="btn gold" disabled={!quickLogText.trim()} onClick={startQuickLogWorkOrder} style={{ width: "100%" }}>Create Work Order</button>
                </div>
              </div>
            </div>
            <div className="card">
              <h2>Work Orders</h2>
              <p className="small">Modeled on how issues actually arrive — a photo report gets a work order number, a contractor gets assigned, and status updates follow until it's closed.</p>
              {enriched.flatMap(f => (f.workOrders || []).map(w => ({ ...w, facilityName: f.name, facilityId: f.id }))).length === 0 && (
                <p className="small">No work orders logged yet.</p>
              )}
              {enriched.flatMap(f => (f.workOrders || []).map(w => ({ ...w, facilityName: f.name, facilityId: f.id })))
                .sort((a, b) => {
                  const aOpen = !CLOSED_STATUSES.includes(a.status), bOpen = !CLOSED_STATUSES.includes(b.status);
                  if (aOpen !== bOpen) return aOpen ? -1 : 1;
                  return (b.severity === "High") - (a.severity === "High");
                })
                .map(w => (
                  <div className="wo-card" key={w.id}>
                    <div className="wo-top">
                      <div>
                        <strong>{w.facilityName}</strong> <span className="wo-number">{w.woNumber}</span>{" "}
                        <span className={"sev-" + w.severity}>{w.severity}</span>
                      </div>
                      <span className={"badge wo-" + w.status.replace(/ /g, "")}>{w.status}</span>
                    </div>
                    <div className="small" style={{ marginTop: "6px" }}>{w.description}</div>
                    <div className="flex" style={{ marginTop: "8px" }}>
                      {w.contractor && <span className="pill">Contractor: {w.contractor}</span>}
                      {w.waitingOn && <span className="wo-tag">Waiting on {w.waitingOn}</span>}
                      <span className="small">Reported {w.dateReported}</span>
                    </div>
                    {w.photo && <img src={w.photo} alt="work order evidence" className="wo-photo" onClick={() => setLightbox(w.photo)} />}
                    {w.activity && w.activity.length > 0 && (
                      <div className="activity-list">
                        {w.activity.slice().reverse().map((a, i) => (
                          <div className="activity-item" key={i}><b>{new Date(a.date).toLocaleString()}</b> — {a.note}</div>
                        ))}
                      </div>
                    )}
                    <div className="flex" style={{ marginTop: "10px" }}>
                      <select style={{ width: "170px" }} value={w.status} onChange={e => updateWOStatus(w.facilityId, w.id, e.target.value)}>
                        {WO_STATUSES.map(s => <option key={s}>{s}</option>)}
                      </select>
                      <button className="btn ghost small" onClick={() => { setEditingWO(w); setWoPrefillDescription(""); setWoFor(w.facilityId); }}>Edit</button>
                      <button className="btn danger small" onClick={() => deleteWorkOrder(w.facilityId, w.id)}>Delete</button>
                    </div>
                  </div>
                ))}
            </div>
          </React.Fragment>
        )}

        {tab === "maintenance" && (
          <div className="card">
            <div className="toolbar">
              <h2 style={{ margin: 0 }}>Preventative &amp; Routine Maintenance</h2>
              <input type="text" placeholder="Search facility name..." value={maintSearch} onChange={e => setMaintSearch(e.target.value)} style={{ width: "220px" }} />
              <button className="btn gold" onClick={() => setShowMaintForm(true)} disabled={facilities.length === 0}>+ Add Task</button>
            </div>
            <p className="small">Recurring upkeep — service schedules, inspections, cleaning cycles — tracked separately from reactive work orders. Sorted by most overdue first. As the maintenance backlog grows across facilities, use the search box to find one quickly.</p>
            {facilities.length === 0 && <p className="small">Add a facility first before scheduling maintenance tasks.</p>}
            {allMaintenanceTasks.length === 0 && facilities.length > 0 && <p className="small">No maintenance tasks scheduled yet.</p>}
            {allMaintenanceTasks.length > 0 && allMaintenanceTasks.filter(t => !maintSearch || t.facilityName.toLowerCase().includes(maintSearch.toLowerCase())).length === 0 && (
              <p className="small">No maintenance tasks match "{maintSearch}".</p>
            )}
            {allMaintenanceTasks.filter(t => !maintSearch || t.facilityName.toLowerCase().includes(maintSearch.toLowerCase())).map(t => (
              <div className="maint-row" key={t.id}>
                <div><strong>{t.facilityName}</strong></div>
                <div>{t.name}</div>
                <div className="small">every {t.frequencyDays}d</div>
                <div className="small">{t.lastCompleted ? "done " + t.lastCompleted : "never done"}</div>
                <div><span className={"badge " + t.status.cls}>{t.status.label}</span></div>
                <div className="flex">
                  <button className="btn ghost small" onClick={() => markMaintenanceDone(t.facilityId, t.id)}>Mark Done Today</button>
                  <button className="btn danger small" onClick={() => deleteMaintenanceTask(t.facilityId, t.id)}>Delete</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === "contractors" && (
          <React.Fragment>
            <div className="card">
              <h2>Contractor Performance</h2>
              <p className="small">Aggregated automatically from work order history — spot a consistently slow contractor before it becomes a pattern.</p>
              {contractorStats.length === 0 && <p className="small">No work orders with a contractor assigned yet.</p>}
              {contractorStats.length > 0 && (
                <table>
                  <thead>
                    <tr><th>Contractor</th><th>Parent Provider</th><th>Total WOs</th><th>Open</th><th>Resolved</th><th>Avg. days to resolve</th></tr>
                  </thead>
                  <tbody>
                    {contractorStats.map(c => (
                      <tr key={c.name}>
                        <td>{c.name}</td>
                        <td>{c.parent || <span className="small">—</span>}</td>
                        <td>{c.total}</td>
                        <td>{c.open}</td>
                        <td>{c.resolved}</td>
                        <td>{c.avgDays === null ? "—" : c.avgDays + "d"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
            <div className="card">
              <h2>Known Contractors</h2>
              <p className="small">Reflects the real structure Neil described: one integrated facilities management service provider (AFMS) who in turn uses smaller sub-contractors where they lack in-house capacity. Add AFMS (or any other primary provider) first, then add sub-contractors underneath it. Maintaining this list also keeps the Work Order form's contractor field consistent instead of "ABC Electrical" vs "abc electrical (Pty) Ltd" fragmenting your stats.</p>
              <div className="grid cols-2">
                <div className="field">
                  <label>Contractor name</label>
                  <input type="text" value={newContractor} onChange={e => setNewContractor(e.target.value)} placeholder="e.g. AFMS or Cape Electrical CC" />
                </div>
                <div className="field">
                  <label>Sub-contractor of (optional)</label>
                  <select value={newContractorParent} onChange={e => setNewContractorParent(e.target.value)}>
                    <option value="">— Primary provider (top-level) —</option>
                    {knownContractors.filter(c => !c.parent).map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                  </select>
                </div>
              </div>
              <button className="btn gold" onClick={addContractor}>Add Contractor</button>
              <div style={{ marginTop: "14px" }}>
                {knownContractors.length === 0 && <p className="small">No contractors added yet — names used on work orders still show up in the table above automatically.</p>}
                {contractorHierarchy.map(top => (
                  <div key={top.name} style={{ marginBottom: "10px" }}>
                    <span className="pill" style={{ marginRight: "6px", marginBottom: "6px", display: "inline-block", fontWeight: 700 }}>
                      {top.name} <button className="close-x" style={{ float: "none", fontSize: "12px", marginLeft: "4px" }} onClick={() => removeContractor(top.name)}>✕</button>
                    </span>
                    {top.children.length > 0 && (
                      <div style={{ marginLeft: "22px", marginTop: "4px" }}>
                        {top.children.map(c => (
                          <span key={c.name} className="pill" style={{ marginRight: "6px", marginBottom: "6px", display: "inline-block" }}>
                            {c.name} <span className="small">(sub-contractor)</span> <button className="close-x" style={{ float: "none", fontSize: "12px", marginLeft: "4px" }} onClick={() => removeContractor(c.name)}>✕</button>
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </React.Fragment>
        )}

        {tab === "qr" && (
          <React.Fragment>
            <div className="card">
              <h2>Facility QR Codes</h2>
              <p className="warn-box">
                Important: these QR codes encode a link back into this exact file. Scanning one with a phone camera only works once this file is hosted at a real, reachable web address (for example GitHub Pages, Netlify, a company intranet site, or similar) — opening it locally by double-clicking (a <code>file://</code> address) means a phone camera cannot reach it, since it only exists on this computer. Until this is hosted somewhere, treat this tab as ready-to-go rather than something to print and stick up yet.
              </p>
              <button className="btn ghost no-print" onClick={() => window.print()}>Print QR Sheet</button>
            </div>
            <div className="card">
              <div className="grid qr-grid">
                {facilities.length === 0 && <p className="small">Add facilities first to generate their QR codes.</p>}
                {facilities.map(f => (
                  <div className="qr-card" key={f.id}>
                    <QRCodeImage value={buildFacilityLink(f.id)} size={140} />
                    <div className="qname">{f.name}</div>
                  </div>
                ))}
              </div>
            </div>
          </React.Fragment>
        )}

        {tab === "import" && (
          <React.Fragment>
            <div className="card">
              <h2>Bring In Facilities From the Rationalisation Planner</h2>
              <p className="small">If facilities were already entered in the Facilities Rationalisation Planner, import that tool's JSON backup here instead of retyping all 115 by hand. Names, officials, and notes come across; inspection status starts fresh since that Planner doesn't track inspections.</p>
              <button className="btn gold" onClick={() => plannerInputRef.current.click()}>Import Planner Backup (JSON)</button>
              <input type="file" accept="application/json" ref={plannerInputRef} style={{ display: "none" }} onChange={importPlannerBackup} />
            </div>
            <div className="card">
              <h2>Bulk Import (CSV or Excel)</h2>
              <p className="small">Three easy ways to load all 115 facilities at once. Header row: <code>name,official,internalstaff,status,lastinspected,inspectionfrequencydays,notes</code>. Status is one of Operational, Needs Attention, Under Repair, Closed. Dates as YYYY-MM-DD. Internal staff and inspection frequency are both optional. Upload works for a plain .csv file or an Excel .xlsx/.xls file directly — no need to save Excel as CSV first.</p>
              <div className="upload-row">
                <button className="btn ghost" onClick={downloadCSVTemplate}>1. Download CSV template</button>
                <span className="small">Open it in Excel or Google Sheets, fill in your facilities, save.</span>
              </div>
              <div className="upload-row">
                <button className="btn gold" onClick={() => csvInputRef.current.click()}>2. Upload your CSV or Excel file</button>
                <input type="file" accept=".csv,text/csv,.xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" ref={csvInputRef} style={{ display: "none" }} onChange={handleCSVFile} />
                <span className="small">Loads the file below so you can check it before importing.</span>
              </div>
              <p className="small" style={{ marginTop: "10px", marginBottom: "4px" }}>…or paste rows directly:</p>
              <textarea rows="8" value={csvText} onChange={e => setCsvText(e.target.value)} placeholder="name,official,internalstaff,status,lastinspected,inspectionfrequencydays,notes&#10;Wynberg Taxi Rank,J. Petersen,L. Meyer,Operational,2026-06-15,,Roof leaking in bay 3"></textarea>
              <div className="flex" style={{ marginTop: "10px" }}>
                <button className="btn gold" disabled={!csvText.trim()} onClick={handleImportCSV}>Import Rows</button>
                {csvText.trim() && <button className="btn ghost" onClick={() => setCsvText("")}>Clear</button>}
              </div>
            </div>
            <div className="card">
              <h2>Export</h2>
              <div className="flex">
                <button className="btn" onClick={exportCSV}>Export Facilities CSV</button>
                <button className="btn" onClick={exportWorkOrdersCSV}>Export Work Orders CSV</button>
                <button className="btn" onClick={exportMaintenanceCSV}>Export Maintenance CSV</button>
              </div>
              <div className="flex" style={{ marginTop: "8px" }}>
                <button className="btn ghost" onClick={exportJSONBackup}>Download full backup (JSON)</button>
                <button className="btn ghost" onClick={() => jsonInputRef.current.click()}>Restore from backup (JSON)</button>
                <input type="file" accept="application/json" ref={jsonInputRef} style={{ display: "none" }} onChange={importJSONBackup} />
              </div>
              <p className="small" style={{ marginTop: "8px" }}>Data lives only in this browser's local storage. Download a JSON backup periodically — clearing browser data or switching computers will lose everything otherwise.</p>
            </div>
          </React.Fragment>
        )}

        {tab === "settings" && (
          <React.Fragment>
            <div className="card">
              <h2>Anthropic API (for the AI Daily Briefing)</h2>
              <div className="field">
                <label>API Key</label>
                <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-ant-..." />
              </div>
              <div className="field">
                <label>Model</label>
                <input type="text" value={model} onChange={e => setModel(e.target.value)} />
                <p className="small">Default is claude-sonnet-5. Update this if Anthropic renames or retires the model.</p>
              </div>
              <p className="small">Your key is stored only in this browser's local storage and sent directly to Anthropic's API — never through any other server.</p>
            </div>
            <div className="card">
              <h2>Overdue Threshold</h2>
              <div className="field">
                <label>Days since last inspection before a facility is flagged overdue</label>
                <input type="number" min="1" max="180" value={overdueDays} onChange={e => setOverdueDays(Math.max(1, Number(e.target.value) || DEFAULT_OVERDUE_DAYS))} />
              </div>
            </div>
            <div className="card">
              <h2>Monitoring Officials (external)</h2>
              <p className="small">Staffed through the external tender operator — for Neil's own internal team (Facility Officers, Technical Assistants, Superintendents), use Internal Staff below instead.</p>
              <div className="flex">
                <input type="text" style={{ width: "220px" }} value={newOfficial} onChange={e => setNewOfficial(e.target.value)} placeholder="Add official name..." />
                <button className="btn gold" onClick={addOfficial}>Add</button>
              </div>
              <div style={{ marginTop: "10px" }}>
                {officials.length === 0 && <p className="small">No officials added yet — add your 10 monitoring officials here, or import them automatically from the Planner backup.</p>}
                {officials.map(o => (
                  <span key={o} className="pill" style={{ marginRight: "6px", marginBottom: "6px", display: "inline-block" }}>
                    {o} <button className="close-x" style={{ float: "none", fontSize: "12px", marginLeft: "4px" }} onClick={() => removeOfficial(o)}>✕</button>
                  </span>
                ))}
              </div>
            </div>
            <div className="card">
              <h2>Internal Staff</h2>
              <p className="small">Neil's own City of Cape Town team — Facility Officers, Technical Assistants, and Superintendents — tracked separately from the externally-staffed Monitoring Officials above. Assign them to facilities on the Facilities tab.</p>
              <div className="grid cols-2">
                <div className="field">
                  <label>Name</label>
                  <input type="text" value={newInternalStaffName} onChange={e => setNewInternalStaffName(e.target.value)} placeholder="Add staff name..." />
                </div>
                <div className="field">
                  <label>Role</label>
                  <select value={newInternalStaffRole} onChange={e => setNewInternalStaffRole(e.target.value)}>
                    {INTERNAL_STAFF_ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                </div>
              </div>
              <button className="btn gold" onClick={addInternalStaff}>Add</button>
              <div style={{ marginTop: "10px" }}>
                {internalStaff.length === 0 && <p className="small">No internal staff added yet.</p>}
                {internalStaff.map(s => (
                  <span key={s.name} className="pill" style={{ marginRight: "6px", marginBottom: "6px", display: "inline-block" }}>
                    {s.name} <span className="small">({s.role})</span> <button className="close-x" style={{ float: "none", fontSize: "12px", marginLeft: "4px" }} onClick={() => removeInternalStaff(s.name)}>✕</button>
                  </span>
                ))}
              </div>
            </div>
          </React.Fragment>
        )}

        <p className="footer-note">Neil Arendse Toolkit — 115 Facilities Monitoring Dashboard v5 · Data stored locally in this browser only. A separate tool from the Facilities Rationalisation Planner — this one tracks day-to-day inspection status, work orders, and preventative maintenance; the Planner handles the Maintain/Optimise/Monitor/Decommission strategic review.</p>
      </main>
      {showForm && (
        <FacilityForm
          initial={editing}
          officials={officials}
          internalStaff={internalStaff}
          overdueDays={overdueDays}
          onSave={saveFacility}
          onCancel={() => { setShowForm(false); setEditing(null); }}
        />
      )}
      {woFor && (
        <WorkOrderForm
          initial={editingWO}
          initialDescription={woPrefillDescription}
          contractorOptions={contractorOptions}
          onSave={(wo) => saveWorkOrder(woFor, wo, !!editingWO)}
          onCancel={() => { setWoFor(null); setEditingWO(null); setWoPrefillDescription(""); }}
        />
      )}
      {showMaintForm && (
        <MaintenanceTaskForm
          facilities={facilities}
          onSave={addMaintenanceTask}
          onCancel={() => setShowMaintForm(false)}
        />
      )}
      {lightbox && (
        <div className="modal-backdrop" onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="full size" style={{ maxWidth: "100%", borderRadius: "10px" }} />
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  // See Facilities_Rationalisation_Planner.html for why this manual-transform pattern is used
  // instead of the automatic <script type="text/babel"> scan: babel-standalone's default JSX
  // runtime is "automatic", which injects an ES module import that cannot execute in a plain
  // script tag and silently fails to mount the app (blank page, no visible error).
  (function () {
    var src = document.getElementById("app-source").textContent;
    try {
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      new Function(out)();
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div style="padding:24px;font-family:sans-serif;color:#B0413E;">' +
        '<h2>This tool failed to start</h2><p>' + (e && e.message ? e.message : e) +
        '</p><p style="color:#5B6B7A;font-size:13px;">Send this message to Matthew — it means something changed in how the browser runs this file.</p></div>';
    }
  })();
</script>
</body>
</html>
