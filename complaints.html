<body>
<div id="root"></div>
<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, useRef } = React;

const STORAGE_KEY = "neil_complaint_manager_v1";
const DEFAULT_MODEL = "claude-sonnet-5";
const DEFAULT_OVERDUE_HOURS = 48;
const SOURCE_OPTIONS = ["Politician", "Public", "Internal"];
const CHANNEL_OPTIONS = ["Email", "WhatsApp", "Phone", "Letter", "In-Person", "Other"];
const PRIORITY_OPTIONS = ["Low", "Medium", "High"];
// Best-guess starting categories — NOT confirmed with Neil. This is an editable
// list (Settings tab), not a hardcoded enum, precisely so it can be corrected
// once Neil says how he actually classifies complaints in practice.
const DEFAULT_CATEGORIES = ["Service Delivery", "Staff Conduct", "Safety & Security", "Infrastructure / Facility Condition", "Billing & Fares", "Scheduling & Reliability", "Other"];
// Status pipeline for a complaint's lifecycle, oldest to newest.
const STATUS_PIPELINE = ["Open", "Acknowledged", "Investigating", "Response Drafted", "Responded", "Closed"];
// A complaint no longer needs action once it reaches one of these.
const RESOLVED_STATUSES = ["Responded", "Closed"];

function statusClass(status) {
  return "status-" + String(status).replace(/ /g, "");
}

// A pasted API key can pick up invisible artifacts from whatever it was copied
// out of (smart quotes, zero-width spaces, a BOM, a stray space from line-
// wrapping) — fetch's Headers throws synchronously ("String contains non
// ISO-8859-1 code point") if any of these end up in a header value. Real
// Anthropic keys are always plain printable ASCII with no whitespace, so it's
// safe to strip anything else before ever building the request.
function sanitizeApiKey(raw) {
  return String(raw || "").replace(/\s+/g, "").replace(/[^\x20-\x7E]/g, "");
}

// Keys are sanitized before every request now, so this should be rare — but if
// it ever recurs (e.g. some other unexpected character slips through), surface
// something actionable instead of the raw browser error message.
function friendlyErrorMessage(e) {
  const msg = e && e.message ? e.message : String(e);
  if (/ISO-8859-1|code point/i.test(msg)) {
    return "Your API key contains a character the browser can't send (likely from copy-pasting). Try deleting it in Settings and re-typing or re-pasting it fresh.";
  }
  return msg;
}

async function callClaude(apiKey, model, prompt) {
  const cleanKey = sanitizeApiKey(apiKey);
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": cleanKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: model,
      max_tokens: 700,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error("API error " + resp.status + ": " + errText.slice(0, 300));
  }
  const data = await resp.json();
  const text = (data.content && data.content[0] && data.content[0].text) || "";
  return text;
}

// Register guidance by complaint source — a reasonable default, but deliberately
// NOT the whole personalization story. Layered under Neil's actual Voice Profile
// below, which is what should dominate once samples exist.
const SOURCE_REGISTER = {
  Politician: "This complaint came from a politician (a councillor, MP, or their office). Write formally and procedurally: acknowledge the specific issue raised, reference next steps and realistic timelines, and keep the tone respectful of the political sensitivity without over-promising.",
  Public: "This complaint came from a member of the public. Write warmly and in plain language: acknowledge their experience and any inconvenience, avoid jargon and internal department names where possible, and explain clearly what happens next.",
  Internal: "This is an internal complaint or issue raised by staff. Write concisely and operationally, focused on the practical resolution path rather than a customer-facing tone."
};

// Pure, directly-testable function — the one genuinely novel piece of logic in
// this tool. Builds the prompt for the AI Response Drafter. Always applies
// source-based register; layers Neil's own voice (real examples + notes) on top
// when available, and degrades cleanly to source-register-only when it isn't.
function buildDraftPrompt(complaint, voiceSamples, voiceNotes) {
  const register = SOURCE_REGISTER[complaint.source] || SOURCE_REGISTER.Public;
  const samples = (voiceSamples || []).filter(Boolean);
  const notes = (voiceNotes || "").trim();

  let voiceBlock = "";
  if (samples.length > 0 || notes) {
    voiceBlock = "\n\nHere is how Neil actually writes complaint responses — match his phrasing, sentence length, and sign-off style as closely as possible, while still following the register guidance above:\n";
    if (notes) voiceBlock += "\nStyle notes: " + notes + "\n";
    samples.forEach((s, i) => { voiceBlock += "\nExample " + (i + 1) + ":\n\"\"\"\n" + s + "\n\"\"\"\n"; });
  } else {
    voiceBlock = "\n\n(No examples of Neil's own writing are available yet, so write in a professional, neutral voice consistent with the register guidance above.)";
  }

  return "You are drafting a written response on behalf of Neil Arendse, Senior Manager: Public Transportation Facilities Management and Enforcement, City of Cape Town, to the complaint below.\n\n"
    + register + voiceBlock
    + "\n\nComplaint details:\n"
    + "Source: " + complaint.source + "\n"
    + "Complainant: " + (complaint.complainantName || "(name not given)") + "\n"
    + "Category: " + (complaint.category || "uncategorised") + "\n"
    + "Facility/location: " + (complaint.facility || "not specified") + "\n"
    + "Description: " + complaint.description + "\n\n"
    + "Write only the response text itself (no subject line, no explanation of your reasoning).";
}

// Pure function building the AI-assisted intake extraction prompt. Given raw
// pasted complaint text (email/WhatsApp/etc.), asks Claude to return strict
// JSON so the Quick Capture form can be pre-filled for Neil/Matthew to review.
function buildExtractPrompt(rawText, categories) {
  const categoryList = (categories && categories.length) ? categories.join(", ") : "(no categories defined yet — suggest a short, sensible one)";
  return "Extract structured fields from this raw complaint text (pasted from an email, WhatsApp message, or similar). "
    + "Respond with ONLY a JSON object, no other text, matching exactly this shape:\n"
    + '{"source": "Politician|Public|Internal", "complainantName": "string or empty", "category": "string", "priority": "Low|Medium|High", "facility": "string or empty", "description": "a clean one-paragraph summary of the complaint"}\n\n'
    + "Choose category from this existing list if a reasonable match exists, otherwise propose a short new one: " + categoryList + "\n"
    + "Infer priority from severity/urgency language in the text (safety or repeated/serious issues = High).\n\n"
    + "Raw text:\n\"\"\"\n" + rawText + "\n\"\"\"";
}

// Tolerant JSON parse — mirrors the Planner's AI generator: if Claude doesn't
// return clean JSON (extra prose, markdown fences, etc.), fall back gracefully
// instead of crashing the intake flow.
function parseExtractedJSON(raw) {
  try {
    return JSON.parse(raw);
  } catch (e) {
    const match = raw.match(/\{[\s\S]*\}/);
    if (match) {
      try { return JSON.parse(match[0]); } catch (e2) { /* fall through */ }
    }
    return null;
  }
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if (lines.length === 0) return [];
  const parseLine = (line) => {
    const out = [];
    let cur = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) {
        out.push(cur);
        cur = "";
      } else {
        cur += ch;
      }
    }
    out.push(cur);
    return out.map(s => s.trim());
  };
  const header = parseLine(lines[0]).map(h => h.toLowerCase());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = parseLine(lines[i]);
    const rec = {};
    header.forEach((h, idx) => { rec[h] = cells[idx] !== undefined ? cells[idx] : ""; });
    rows.push(rec);
  }
  return rows;
}

function toCSVValue(v) {
  if (v === undefined || v === null) return "";
  const s = String(v);
  if (s.includes(",") || s.includes('"') || s.includes("\n")) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const DEMO_OFFICIALS = ["M. Adams", "J. Petersen"];

// A real example of how Neil actually writes, provided by Matthew — seeded as
// the starting Voice Profile sample so the tool ships already grounded in his
// actual voice instead of empty. Only applies on a genuinely first-ever open
// (see App() below); once anything has been saved, whatever's actually in
// Settings is respected, even if that's since been edited down to nothing.
const NEIL_VOICE_SEED = "Good Day\n\nYour complaint is duly noted for attention and feedback will follow in due course.\n\nKind Regards";

// Example data shown on the very first open so the tool isn't a blank shell.
// Every seeded complaint carries `_demo: true` so it can be cleared in one
// click without touching anything the user has entered themselves.
function demoSeed() {
  function daysAgoStr(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString().slice(0, 10);
  }
  function stamp(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString();
  }
  return {
    officials: DEMO_OFFICIALS.slice(),
    categories: DEFAULT_CATEGORIES.slice(),
    complaints: [
      {
        id: uid(), _demo: true, source: "Politician", complainantName: "Cllr. N. Booysen", contact: "",
        channel: "Email", facility: "Bellville PTI", category: "Service Delivery", priority: "Medium",
        description: "Councillor query about repeated delays getting a response on constituent complaints in this ward.",
        dateReceived: daysAgoStr(1), status: "Acknowledged", assignedTo: "M. Adams",
        aiDraftResponse: "", aiDraftOriginal: "", photo: null,
        activity: [{ date: stamp(1), note: "Complaint logged (Open)" }, { date: stamp(1), note: "Status changed to Acknowledged" }],
        dateResponded: null, dateClosed: null
      },
      {
        id: uid(), _demo: true, source: "Public", complainantName: "T. Naidoo", contact: "",
        channel: "WhatsApp", facility: "Wynberg Taxi Rank", category: "Safety & Security", priority: "High",
        description: "Broken lighting in the main shelter — feels unsafe waiting there after dark.",
        dateReceived: daysAgoStr(3), status: "Open", assignedTo: "J. Petersen",
        aiDraftResponse: "", aiDraftOriginal: "", photo: null,
        activity: [{ date: stamp(3), note: "Complaint logged (Open)" }],
        dateResponded: null, dateClosed: null
      },
      {
        id: uid(), _demo: true, source: "Public", complainantName: "S. Abrahams", contact: "",
        channel: "Email", facility: "Mitchells Plain PTI", category: "Staff Conduct", priority: "Medium",
        description: "Felt an official was dismissive when asking about ablution facility hours.",
        dateReceived: daysAgoStr(6), status: "Responded", assignedTo: "M. Adams",
        // Demonstrates what a voice-adapted, already-sent draft looks like once the feature is used.
        aiDraftResponse: "Thank you for taking the time to raise this — that's not the standard of service we expect, and I've spoken directly with the site team about it. Ablution facilities are open from 05:00 to 22:00 daily. I appreciate you bringing it to my attention. Kind regards, Neil Arendse, Senior Manager: PT Facilities & Enforcement.",
        aiDraftOriginal: "Thank you for taking the time to raise this — that's not the standard of service we expect, and I've spoken directly with the site team about it. Ablution facilities are open from 05:00 to 22:00 daily. I appreciate you bringing it to my attention. Kind regards, Neil Arendse, Senior Manager: PT Facilities & Enforcement.",
        photo: null,
        activity: [{ date: stamp(6), note: "Complaint logged (Open)" }, { date: stamp(5), note: "Status changed to Responded" }],
        dateResponded: daysAgoStr(5), dateClosed: null
      },
      {
        id: uid(), _demo: true, source: "Internal", complainantName: "Ops Team", contact: "",
        channel: "Email", facility: "", category: "Billing & Fares", priority: "Medium",
        description: "Internal note: a fare-machine fault at one facility needs a public-facing response drafted before it goes out.",
        dateReceived: daysAgoStr(1), status: "Response Drafted", assignedTo: "M. Adams",
        aiDraftResponse: "Draft prepared, awaiting sign-off before sending.", aiDraftOriginal: "Draft prepared, awaiting sign-off before sending.",
        photo: null, activity: [{ date: stamp(1), note: "Complaint logged (Open)" }, { date: stamp(1), note: "Status changed to Response Drafted" }],
        dateResponded: null, dateClosed: null
      },
      {
        id: uid(), _demo: true, source: "Public", complainantName: "K. Daniels", contact: "",
        channel: "Phone", facility: "Khayelitsha Site B", category: "Infrastructure / Facility Condition", priority: "Low",
        description: "General enquiry, newly logged — no action taken yet.",
        dateReceived: daysAgoStr(0), status: "Open", assignedTo: "",
        aiDraftResponse: "", aiDraftOriginal: "", photo: null,
        activity: [{ date: stamp(0), note: "Complaint logged (Open)" }],
        dateResponded: null, dateClosed: null
      }
    ]
  };
}

// Hours since a date-only string (dateReceived is captured as a date, not a
// timestamp — same convention as the Dashboard's daysSince — so this is
// effectively "days since, in hours" plus the partial current day. Good enough
// for a 48h-style threshold without forcing Neil to log an exact time.
function hoursSince(dateStr) {
  if (!dateStr) return null;
  const then = new Date(dateStr + "T00:00:00");
  if (isNaN(then.getTime())) return null;
  return Math.floor((Date.now() - then.getTime()) / (1000 * 60 * 60));
}

function uid() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return "id-" + Math.random().toString(36).slice(2) + Date.now();
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function nowStamp() {
  return new Date().toISOString();
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    console.error("Failed to load saved state", e);
    return null;
  }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error("Failed to save state", e);
  }
}

function ComplaintForm({ initial, prefill, officials, categories, apiKey, model, voiceSamples, voiceNotes, onSave, onSaveVoiceSample, onCancel }) {
  const [c, setC] = useState(initial || {
    id: uid(), source: "Public", complainantName: "", contact: "", channel: "Email",
    facility: "", category: categories[0] || "", priority: "Medium", description: "",
    dateReceived: todayStr(), status: "Open", assignedTo: "", aiDraftResponse: "", aiDraftOriginal: "",
    photo: null, activity: [], dateResponded: null, dateClosed: null,
    ...(prefill || {})
  });
  const [draftBusy, setDraftBusy] = useState(false);
  const [copied, setCopied] = useState(false);
  const set = (k, v) => setC(prev => ({ ...prev, [k]: v }));

  // Simple enough to catch the common case without being a full RFC validator —
  // good enough to decide whether "Open in Email" makes sense to show.
  const contactLooksLikeEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((c.contact || "").trim());

  async function copyDraftToClipboard() {
    try {
      await navigator.clipboard.writeText(c.aiDraftResponse);
    } catch (e) {
      // Fallback for browsers/contexts where the async Clipboard API is blocked.
      const ta = document.createElement("textarea");
      ta.value = c.aiDraftResponse;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand("copy"); } catch (e2) { /* nothing more to do */ }
      document.body.removeChild(ta);
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }

  function openInEmail() {
    const subject = "Re: your complaint" + (c.category ? " — " + c.category : "");
    const mailto = "mailto:" + encodeURIComponent(c.contact.trim())
      + "?subject=" + encodeURIComponent(subject)
      + "&body=" + encodeURIComponent(c.aiDraftResponse);
    window.location.href = mailto;
  }

  async function generateDraft() {
    if (!apiKey) { alert("Add your Anthropic API key in Settings first."); return; }
    setDraftBusy(true);
    try {
      const prompt = buildDraftPrompt(c, voiceSamples, voiceNotes);
      const draft = await callClaude(apiKey, model, prompt);
      set("aiDraftResponse", draft.trim());
      set("aiDraftOriginal", draft.trim());
    } catch (e) {
      alert("Draft generation failed: " + friendlyErrorMessage(e));
    } finally {
      setDraftBusy(false);
    }
  }

  function handleSave() {
    // Self-improving voice loop: if Neil edited the AI draft before marking the
    // complaint Responded, offer to keep that edited text as a future voice
    // example — grows the few-shot set from real, already-approved output.
    const edited = c.aiDraftOriginal && c.aiDraftResponse && c.aiDraftResponse.trim() !== c.aiDraftOriginal.trim();
    if (c.status === "Responded" && edited && onSaveVoiceSample) {
      const save = window.confirm("You edited the AI draft before marking this Responded. Save your edited version as one of Neil's voice examples, to improve future drafts?");
      if (save) onSaveVoiceSample(c.aiDraftResponse.trim());
    }
    onSave(c);
  }
  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal wide">
        <button className="close-x" onClick={onCancel}>✕</button>
        <h3>{initial ? "Edit Complaint" : "Log a Complaint"}</h3>
        <div className="grid cols-2">
          <div className="field">
            <label>Source</label>
            <select value={c.source} onChange={e => set("source", e.target.value)}>
              {SOURCE_OPTIONS.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Channel</label>
            <select value={c.channel} onChange={e => set("channel", e.target.value)}>
              {CHANNEL_OPTIONS.map(o => <option key={o}>{o}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Complainant name</label>
            <input type="text" value={c.complainantName} onChange={e => set("complainantName", e.target.value)} placeholder="e.g. Cllr. N. Booysen or J. Adams" />
          </div>
          <div className="field">
            <label>Contact (optional)</label>
            <input type="text" value={c.contact} onChange={e => set("contact", e.target.value)} placeholder="phone or email" />
          </div>
          <div className="field">
            <label>Facility / location (optional)</label>
            <input type="text" value={c.facility} onChange={e => set("facility", e.target.value)} placeholder="e.g. Wynberg Taxi Rank" />
          </div>
          <div className="field">
            <label>Category</label>
            <select value={c.category} onChange={e => set("category", e.target.value)}>
              <option value="">Uncategorised</option>
              {categories.map(cat => <option key={cat}>{cat}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Priority</label>
            <select value={c.priority} onChange={e => set("priority", e.target.value)}>
              {PRIORITY_OPTIONS.map(p => <option key={p}>{p}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Date received</label>
            <input type="date" value={c.dateReceived} onChange={e => set("dateReceived", e.target.value)} />
          </div>
          <div className="field">
            <label>Assigned to</label>
            <select value={c.assignedTo} onChange={e => set("assignedTo", e.target.value)}>
              <option value="">Unassigned</option>
              {officials.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Status</label>
            <select value={c.status} onChange={e => set("status", e.target.value)}>
              {STATUS_PIPELINE.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div className="field">
          <label>Description</label>
          <textarea rows="4" value={c.description} onChange={e => set("description", e.target.value)} placeholder="What was actually said or written..." />
        </div>
        <div className="draft-box">
          <div className="flex" style={{ justifyContent: "space-between" }}>
            <label style={{ marginBottom: 0 }}>AI Response Draft</label>
            <button className="btn ghost small" onClick={generateDraft} disabled={draftBusy || !c.description.trim()}>
              {draftBusy ? "Drafting..." : (c.aiDraftResponse ? "Regenerate Draft" : "Draft Response")}
            </button>
          </div>
          {!c.description.trim() ? (
            <p className="small" style={{ color: "var(--bad)" }}>Add a description above first — the button is disabled until there's something to draft a response to.</p>
          ) : voiceSamples.length === 0 ? (
            <p className="small">No voice examples yet, so this draft will use a neutral, source-based tone rather than Neil's own style — add a few real examples in Settings to change that.</p>
          ) : (
            <p className="small">Adapts tone to the complaint source, layered with Neil's own Voice Profile ({voiceSamples.length} example{voiceSamples.length === 1 ? "" : "s"} on file).</p>
          )}
          <textarea rows="6" value={c.aiDraftResponse} onChange={e => set("aiDraftResponse", e.target.value)} placeholder="Click Draft Response, or write one manually here..." />
          {c.aiDraftResponse && (
            <div className="flex" style={{ marginTop: "8px" }}>
              <button className="btn ghost small" onClick={copyDraftToClipboard}>{copied ? "Copied!" : "Copy Response"}</button>
              {contactLooksLikeEmail && (
                <button className="btn ghost small" onClick={openInEmail}>Open in Email</button>
              )}
            </div>
          )}
        </div>
        {c.activity && c.activity.length > 0 && (
          <div className="activity-list">
            <label>History</label>
            {c.activity.slice().reverse().map((a, i) => (
              <div className="activity-item" key={i}><b>{new Date(a.date).toLocaleString()}</b> — {a.note}</div>
            ))}
          </div>
        )}
        <div className="flex" style={{ justifyContent: "flex-end", marginTop: "10px" }}>
          <button className="btn ghost" onClick={onCancel}>Cancel</button>
          <button className="btn gold" disabled={!c.description.trim()} onClick={handleSave}>Save Complaint</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const saved = loadState();
  // First-ever open (nothing saved yet): start with example data so the tool
  // isn't an empty shell. Everything seeded is flagged _demo and clears in one click.
  const seed = saved || demoSeed();
  const [complaints, setComplaints] = useState(seed.complaints || []);
  const [officials, setOfficials] = useState(seed.officials || []);
  const [categories, setCategories] = useState(seed.categories || []);
  const [apiKey, setApiKey] = useState(saved && saved.apiKey ? saved.apiKey : "");
  const [model, setModel] = useState(saved && saved.model ? saved.model : DEFAULT_MODEL);
  const [overdueHours, setOverdueHours] = useState(saved && saved.overdueHours !== undefined ? saved.overdueHours : DEFAULT_OVERDUE_HOURS);
  const [voiceSamples, setVoiceSamples] = useState(saved ? (saved.voiceSamples || []) : [NEIL_VOICE_SEED]);
  const [voiceNotes, setVoiceNotes] = useState(saved && saved.voiceNotes ? saved.voiceNotes : "");

  const [tab, setTab] = useState("dashboard");
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [filterCategory, setFilterCategory] = useState("");
  const [filterPriority, setFilterPriority] = useState("");
  const [filterOfficial, setFilterOfficial] = useState("");
  const [newOfficial, setNewOfficial] = useState("");
  const [newCategory, setNewCategory] = useState("");
  const [newVoiceSample, setNewVoiceSample] = useState("");
  const [quickCaptureText, setQuickCaptureText] = useState("");
  const [quickCaptureDraftToo, setQuickCaptureDraftToo] = useState(false);
  const [quickCaptureBusy, setQuickCaptureBusy] = useState(false);
  const [prefillForForm, setPrefillForForm] = useState(null);
  const [backlogSummary, setBacklogSummary] = useState(saved && saved.backlogSummary ? saved.backlogSummary : "");
  const [backlogSummaryAt, setBacklogSummaryAt] = useState(saved && saved.backlogSummaryAt ? saved.backlogSummaryAt : "");
  const [backlogBusy, setBacklogBusy] = useState(false);
  const [csvText, setCsvText] = useState("");
  const csvInputRef = useRef(null);
  const jsonInputRef = useRef(null);
  const dashboardInputRef = useRef(null);

  useEffect(() => {
    saveState({ complaints, officials, categories, apiKey, model, overdueHours, voiceSamples, voiceNotes, backlogSummary, backlogSummaryAt });
  }, [complaints, officials, categories, apiKey, model, overdueHours, voiceSamples, voiceNotes, backlogSummary, backlogSummaryAt]);

  const enriched = useMemo(() => {
    return complaints.map(c => {
      const hoursOpen = hoursSince(c.dateReceived);
      const resolved = RESOLVED_STATUSES.includes(c.status);
      const overdue = !resolved && hoursOpen !== null && hoursOpen > overdueHours;
      return { ...c, hoursOpen, overdue };
    });
  }, [complaints, overdueHours]);

  const filtered = useMemo(() => {
    return enriched.filter(c => {
      if (search) {
        const q = search.toLowerCase();
        const hay = (c.complainantName + " " + c.description + " " + (c.facility || "")).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      if (filterStatus && c.status !== filterStatus) return false;
      if (filterCategory && c.category !== filterCategory) return false;
      if (filterPriority && c.priority !== filterPriority) return false;
      if (filterOfficial && c.assignedTo !== filterOfficial) return false;
      return true;
    }).sort((a, b) => (b.overdue === a.overdue ? b.hoursOpen - a.hoursOpen : (b.overdue ? 1 : -1)));
  }, [enriched, search, filterStatus, filterCategory, filterPriority, filterOfficial]);

  // Response Backlog — deliberately NOT a re-skin of a generic "daily briefing".
  // Tracks this tool's specific failure mode: complaints overdue for a response,
  // and drafts that were generated but never actually sent (status stuck at
  // "Response Drafted"). Politician complaints are flagged separately since a
  // delay there carries outsized political risk regardless of raw age.
  const summary = useMemo(() => {
    const unresolved = enriched.filter(c => !RESOLVED_STATUSES.includes(c.status));
    const overdueCount = unresolved.filter(c => c.overdue).length;
    const draftedNotSentCount = enriched.filter(c => c.status === "Response Drafted").length;
    const politicianOpenCount = unresolved.filter(c => c.source === "Politician").length;
    return { total: enriched.length, unresolvedCount: unresolved.length, overdueCount, draftedNotSentCount, politicianOpenCount };
  }, [enriched]);

  const workload = useMemo(() => {
    const map = {};
    officials.forEach(o => { map[o] = { total: 0, overdue: 0 }; });
    enriched.forEach(c => {
      if (RESOLVED_STATUSES.includes(c.status)) return;
      const key = c.assignedTo || "Unassigned";
      if (!map[key]) map[key] = { total: 0, overdue: 0 };
      map[key].total += 1;
      if (c.overdue) map[key].overdue += 1;
    });
    return Object.entries(map).filter(([, v]) => v.total > 0).sort((a, b) => b[1].total - a[1].total);
  }, [officials, enriched]);

  const maxWorkload = Math.max(1, ...workload.map(([, v]) => v.total));

  const atRiskList = useMemo(() => {
    return enriched
      .filter(c => !RESOLVED_STATUSES.includes(c.status) && (c.overdue || c.source === "Politician" || c.status === "Response Drafted"))
      .sort((a, b) => {
        if ((a.source === "Politician") !== (b.source === "Politician")) return a.source === "Politician" ? -1 : 1;
        if (a.overdue !== b.overdue) return a.overdue ? -1 : 1;
        return (b.hoursOpen || 0) - (a.hoursOpen || 0);
      })
      .slice(0, 8);
  }, [enriched]);

  async function generateBacklogSummary() {
    if (!apiKey) { alert("Add your Anthropic API key in Settings first."); setTab("settings"); return; }
    setBacklogBusy(true);
    try {
      const overdueList = enriched.filter(c => !RESOLVED_STATUSES.includes(c.status) && c.overdue).slice(0, 10)
        .map(c => `${c.complainantName || "(unnamed)"} (${c.source}, ${c.hoursOpen}h open, ${c.category || "uncategorised"})`).join("; ");
      const draftedList = enriched.filter(c => c.status === "Response Drafted").slice(0, 10)
        .map(c => `${c.complainantName || "(unnamed)"} (${c.source})`).join("; ");
      const politicianList = enriched.filter(c => !RESOLVED_STATUSES.includes(c.status) && c.source === "Politician").slice(0, 10)
        .map(c => `${c.complainantName || "(unnamed)"} — ${c.status}, ${c.hoursOpen === null ? "age unknown" : c.hoursOpen + "h open"}`).join("; ");
      const prompt = `You are briefing a Senior Manager at the City of Cape Town (Public Transportation Facilities Management) on their complaint-response backlog. Give a short, prioritized, plain-language summary (4-6 sentences, no headings, no bullet points) of what most needs a response today. Prioritize politician complaints first regardless of age, then overdue complaints, then drafts that were generated but never sent.

Total complaints logged: ${summary.total}
Unresolved: ${summary.unresolvedCount}
Overdue for response (over ${overdueHours}h): ${summary.overdueCount}
Overdue details: ${overdueList || "none"}
Politician complaints still open: ${summary.politicianOpenCount}
Politician details: ${politicianList || "none"}
Drafted but not yet sent: ${summary.draftedNotSentCount}
Drafted-not-sent details: ${draftedList || "none"}

Write the summary directly, as if speaking to the manager.`;
      const raw = await callClaude(apiKey, model, prompt);
      setBacklogSummary(raw.trim());
      setBacklogSummaryAt(new Date().toISOString());
    } catch (e) {
      alert("Backlog summary generation failed: " + friendlyErrorMessage(e));
    } finally {
      setBacklogBusy(false);
    }
  }

  function saveComplaint(c) {
    setComplaints(prev => {
      const exists = prev.some(p => p.id === c.id);
      if (exists) return prev.map(p => p.id === c.id ? c : p);
      return [...prev, { ...c, activity: c.activity && c.activity.length ? c.activity : [{ date: nowStamp(), note: "Complaint logged (" + c.status + ")" }] }];
    });
    setShowForm(false);
    setEditing(null);
    setPrefillForForm(null);
  }

  function deleteComplaint(id) {
    if (!window.confirm("Delete this complaint? This cannot be undone.")) return;
    setComplaints(prev => prev.filter(c => c.id !== id));
  }

  function updateComplaintStatus(id, newStatus) {
    setComplaints(prev => prev.map(c => {
      if (c.id !== id) return c;
      return {
        ...c, status: newStatus,
        dateResponded: newStatus === "Responded" ? todayStr() : c.dateResponded,
        dateClosed: newStatus === "Closed" ? todayStr() : c.dateClosed,
        activity: [...(c.activity || []), { date: nowStamp(), note: "Status changed to " + newStatus }]
      };
    }));
  }

  function addOfficial() {
    const name = newOfficial.trim();
    if (!name || officials.includes(name)) return;
    setOfficials(prev => [...prev, name]);
    setNewOfficial("");
  }

  function removeOfficial(name) {
    setOfficials(prev => prev.filter(o => o !== name));
  }

  function addCategory() {
    const name = newCategory.trim();
    if (!name || categories.includes(name)) return;
    setCategories(prev => [...prev, name]);
    setNewCategory("");
  }

  function removeCategory(name) {
    setCategories(prev => prev.filter(c => c !== name));
  }

  function addVoiceSample() {
    const text = newVoiceSample.trim();
    if (!text) return;
    setVoiceSamples(prev => [...prev, text]);
    setNewVoiceSample("");
  }

  function removeVoiceSample(index) {
    setVoiceSamples(prev => prev.filter((_, i) => i !== index));
  }

  // Called from ComplaintForm's self-improving loop when Neil edits a draft
  // before marking a complaint Responded — grows the few-shot set for free.
  function saveVoiceSampleFromDraft(text) {
    if (!text || voiceSamples.includes(text)) return;
    setVoiceSamples(prev => [...prev, text]);
  }

  const hasDemo = useMemo(() => complaints.some(c => c._demo), [complaints]);

  // Remove only the seeded example complaints, preserving anything the user has
  // added, and drop demo-provided officials/categories that are no longer
  // referenced by any real complaint.
  function clearDemoData() {
    if (!window.confirm("Clear the example complaints and start fresh?\n\nThis removes the sample complaints so you can log real ones. Anything you've already added yourself is kept.")) return;
    const real = complaints.filter(c => !c._demo);
    const usedOfficials = new Set(real.map(c => c.assignedTo).filter(Boolean));
    const usedCategories = new Set(real.map(c => c.category).filter(Boolean));
    setComplaints(real);
    setOfficials(prev => prev.filter(o => !DEMO_OFFICIALS.includes(o) || usedOfficials.has(o)));
    setCategories(prev => prev.filter(c => !DEFAULT_CATEGORIES.includes(c) || usedCategories.has(c)));
  }

  // When bulk-importing real complaints, drop the seeded examples first so the
  // user's data replaces them rather than sitting mixed in alongside.
  function withoutDemo(list) {
    return list.filter(c => !c._demo);
  }

  function handleImportCSV() {
    const rows = parseCSV(csvText);
    if (rows.length === 0) { alert("No rows found. Header row should be: source,complainantname,contact,channel,facility,category,priority,description,datereceived,status,assignedto"); return; }
    const imported = rows.map(r => ({
      id: uid(),
      source: SOURCE_OPTIONS.includes(r.source) ? r.source : "Public",
      complainantName: r.complainantname || r.complainant || "",
      contact: r.contact || "",
      channel: CHANNEL_OPTIONS.includes(r.channel) ? r.channel : "Email",
      facility: r.facility || "",
      category: r.category || "",
      priority: PRIORITY_OPTIONS.includes(r.priority) ? r.priority : "Medium",
      description: r.description || "",
      dateReceived: r.datereceived || r["date received"] || todayStr(),
      status: STATUS_PIPELINE.includes(r.status) ? r.status : "Open",
      assignedTo: r.assignedto || r["assigned to"] || "",
      aiDraftResponse: "", aiDraftOriginal: "", photo: null,
      activity: [{ date: nowStamp(), note: "Complaint logged (via CSV import)" }],
      dateResponded: null, dateClosed: null
    }));
    setComplaints(prev => [...withoutDemo(prev), ...imported]);
    const newOfficials = Array.from(new Set(imported.map(c => c.assignedTo).filter(Boolean)));
    setOfficials(prev => Array.from(new Set([...prev, ...newOfficials])));
    const newCategories = Array.from(new Set(imported.map(c => c.category).filter(Boolean)));
    setCategories(prev => Array.from(new Set([...prev, ...newCategories])));
    setCsvText("");
    alert(`Imported ${imported.length} complaints.`);
  }

  function handleCSVFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => { setCsvText(evt.target.result || ""); };
    reader.onerror = () => alert("Could not read that file.");
    reader.readAsText(file);
    e.target.value = "";
  }

  function downloadCSVTemplate() {
    const content = "source,complainantname,contact,channel,facility,category,priority,description,datereceived,status,assignedto\n"
      + "Public,J. Smith,,WhatsApp,Wynberg Taxi Rank,Safety & Security,High,Broken lighting in shelter,2026-06-30,Open,M. Adams\n"
      + "Politician,Cllr. N. Booysen,,Email,Bellville PTI,Service Delivery,Medium,Query about repeated delays,2026-07-04,Acknowledged,M. Adams\n";
    downloadFile("complaints_template.csv", content, "text/csv");
  }

  function exportComplaintsCSV() {
    const header = ["Source", "Complainant", "Channel", "Facility", "Category", "Priority", "Status", "AssignedTo", "DateReceived", "HoursOpen", "Overdue", "Description"];
    const lines = [header.join(",")];
    enriched.forEach(c => {
      lines.push([
        toCSVValue(c.source), toCSVValue(c.complainantName), toCSVValue(c.channel), toCSVValue(c.facility || ""),
        toCSVValue(c.category || ""), toCSVValue(c.priority), toCSVValue(c.status), toCSVValue(c.assignedTo || ""),
        toCSVValue(c.dateReceived), c.hoursOpen === null ? "unknown" : c.hoursOpen, c.overdue ? "YES" : "no", toCSVValue(c.description)
      ].join(","));
    });
    downloadFile("complaints_" + todayStr() + ".csv", lines.join("\n"), "text/csv");
  }

  function exportJSONBackup() {
    const payload = { complaints, officials, categories, overdueHours, model, voiceSamples, voiceNotes, exportedAt: new Date().toISOString() };
    downloadFile("complaint_manager_backup_" + todayStr() + ".json", JSON.stringify(payload, null, 2), "application/json");
  }

  function importJSONBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!window.confirm("This will replace all current complaints and settings with the backup file. Continue?")) return;
        setComplaints(data.complaints || []);
        setOfficials(data.officials || []);
        setCategories(data.categories || []);
        setOverdueHours(data.overdueHours !== undefined ? data.overdueHours : DEFAULT_OVERDUE_HOURS);
        if (data.model) setModel(data.model);
        setVoiceSamples(data.voiceSamples || []);
        setVoiceNotes(data.voiceNotes || "");
        alert("Backup restored.");
      } catch (err) {
        alert("Could not read that file — is it a valid backup JSON?");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // One-way import: bring officials across from the Facilities Monitoring
  // Dashboard's JSON backup, so the same 10-person team doesn't need retyping.
  function importOfficialsFromDashboard(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!data || !Array.isArray(data.officials)) { alert("That doesn't look like a Facilities Monitoring Dashboard backup file."); return; }
        if (!window.confirm(`Import ${data.officials.length} officials from the Dashboard backup? This adds them alongside anything already here.`)) return;
        setOfficials(prev => Array.from(new Set([...prev, ...data.officials])));
        alert(`Imported ${data.officials.length} officials from the Dashboard.`);
      } catch (err) {
        alert("Could not read that file — is it a valid Dashboard backup JSON?");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  // AI-Assisted Intake: paste raw complaint text, extract structured fields via
  // Claude (with a tolerant JSON fallback), optionally draft a first-pass
  // response in the same flow, then open the form pre-filled for review before
  // saving. Nothing is saved automatically — Neil/Matthew always reviews first.
  async function analyzeQuickCapture() {
    if (!apiKey) { alert("Add your Anthropic API key in Settings first."); setTab("settings"); return; }
    const rawText = quickCaptureText.trim();
    if (!rawText) return;
    setQuickCaptureBusy(true);
    try {
      const extractPrompt = buildExtractPrompt(rawText, categories);
      const raw = await callClaude(apiKey, model, extractPrompt);
      const parsed = parseExtractedJSON(raw);
      const prefill = {
        source: (parsed && SOURCE_OPTIONS.includes(parsed.source)) ? parsed.source : "Public",
        complainantName: (parsed && parsed.complainantName) || "",
        category: (parsed && parsed.category) || "",
        priority: (parsed && PRIORITY_OPTIONS.includes(parsed.priority)) ? parsed.priority : "Medium",
        facility: (parsed && parsed.facility) || "",
        description: (parsed && parsed.description) || rawText
      };
      if (quickCaptureDraftToo) {
        try {
          const draftPrompt = buildDraftPrompt(prefill, voiceSamples, voiceNotes);
          const draft = await callClaude(apiKey, model, draftPrompt);
          prefill.aiDraftResponse = draft.trim();
          prefill.aiDraftOriginal = draft.trim();
        } catch (e) {
          // Extraction still succeeded even if the optional draft call failed — don't block the intake on it.
          console.error("Quick-capture draft step failed", e);
        }
      }
      setPrefillForForm(prefill);
      setEditing(null);
      setShowForm(true);
      setQuickCaptureText("");
    } catch (e) {
      alert("Analyze failed: " + friendlyErrorMessage(e) + "\n\nYou can still log this complaint manually with + Log Complaint.");
    } finally {
      setQuickCaptureBusy(false);
    }
  }

  return (
    <React.Fragment>
      <header className="app-header">
        <div className="header-row">
          <div>
            <h1>Complaint Manager &amp; AI Response Drafter</h1>
            <p>Public Transportation Facilities Management — City of Cape Town</p>
          </div>
          <span className="gold-badge">{complaints.length} complaint{complaints.length === 1 ? "" : "s"} logged</span>
        </div>
      </header>
      <nav className="tabs">
        <button className={tab === "dashboard" ? "active" : ""} onClick={() => setTab("dashboard")}>Dashboard</button>
        <button className={tab === "complaints" ? "active" : ""} onClick={() => setTab("complaints")}>Complaints</button>
        <button className={tab === "import" ? "active" : ""} onClick={() => setTab("import")}>Import / Export</button>
        <button className={tab === "settings" ? "active" : ""} onClick={() => setTab("settings")}>Settings</button>
      </nav>
      <main>
        {hasDemo && (
          <div className="demo-banner no-print">
            <span><b>Example data loaded.</b> These are sample complaints so you can explore how the tool works. When you're ready, clear them and log your own on the Complaints or Import / Export tab.</span>
            <button className="btn small gold" onClick={clearDemoData}>Clear example data</button>
          </div>
        )}
        {tab === "dashboard" && (
          <React.Fragment>
            <div className="grid cols-4">
              <StatCard num={summary.unresolvedCount} label="Unresolved complaints" />
              <StatCard num={summary.overdueCount} label={"Overdue for response (>" + overdueHours + "h)"} alert={summary.overdueCount > 0} />
              <StatCard num={summary.draftedNotSentCount} label="Drafted but not sent" alert={summary.draftedNotSentCount > 0} />
              <StatCard num={summary.politicianOpenCount} label="Politician complaints open" alert={summary.politicianOpenCount > 0} />
            </div>
            <div className="card">
              <h2>Generate Backlog Summary</h2>
              <p className="small">A short, prioritized summary of what most needs a response today — politician complaints first regardless of age, then overdue, then drafts sitting unsent. Different from a generic daily briefing: this is built specifically from this tool's own bottleneck.</p>
              <button className="btn gold" onClick={generateBacklogSummary} disabled={backlogBusy}>{backlogBusy ? "Generating..." : "Generate Backlog Summary"}</button>
              {backlogSummary && (
                <div className="ai-box">
                  {backlogSummary}
                  <div className="small" style={{ marginTop: "8px" }}>Generated {backlogSummaryAt ? new Date(backlogSummaryAt).toLocaleString() : ""}</div>
                </div>
              )}
            </div>
            <div className="card">
              <h2>At Risk</h2>
              <p className="small">Politician complaints, overdue complaints, and drafts not yet sent — surfaced together regardless of the Complaints tab's own sort order.</p>
              {atRiskList.length === 0 && <p className="small">Nothing at risk right now.</p>}
              {atRiskList.map(c => (
                <div className="complaint-card" key={c.id}>
                  <div className="cc-top">
                    <div>
                      <div className="cc-name">{c.complainantName || "(unnamed)"}</div>
                      <div className="cc-meta">{c.category || "Uncategorised"} · {c.status}</div>
                    </div>
                    <span className={"badge source-" + c.source}>{c.source}</span>
                  </div>
                  <div className="cc-meta" style={{ marginTop: "6px" }}>
                    {c.hoursOpen !== null && <span className={"badge " + (c.overdue ? "overdue" : "ok")}>{c.hoursOpen}h open</span>}{" "}
                    {c.assignedTo || "Unassigned"}
                  </div>
                </div>
              ))}
            </div>
            <div className="card">
              <h2>Workload by Official</h2>
              <p className="small">Unresolved complaint count per official, with overdue count highlighted — spot an overloaded official before it becomes a problem.</p>
              {workload.length === 0 && <p className="small">No unresolved complaints assigned yet.</p>}
              {workload.map(([name, v]) => (
                <div className="bar-row" key={name}>
                  <div>{name}</div>
                  <div className="bar-track">
                    <div className={"bar-fill" + (v.overdue > 0 ? " overdue" : "")} style={{ width: (v.total / maxWorkload * 100) + "%" }}></div>
                  </div>
                  <div className="small">{v.total} ({v.overdue} late)</div>
                </div>
              ))}
            </div>
          </React.Fragment>
        )}
        {tab === "complaints" && (
          <React.Fragment>
          <div className="card">
            <h2>AI-Assisted Intake</h2>
            <p className="small">Paste a raw complaint (email, WhatsApp forward, call notes) — Claude suggests category, priority, and facility, and pre-fills the form for you to review before saving. Nothing is saved automatically.</p>
            <div className="field">
              <textarea rows="4" value={quickCaptureText} onChange={e => setQuickCaptureText(e.target.value)} placeholder="Paste the complaint text here..." />
            </div>
            <div className="flex" style={{ justifyContent: "space-between" }}>
              <label className="flex" style={{ marginBottom: 0, fontWeight: 600 }}>
                <input type="checkbox" style={{ width: "auto" }} checked={quickCaptureDraftToo} onChange={e => setQuickCaptureDraftToo(e.target.checked)} /> Also draft a first response now
              </label>
              <button className="btn gold" disabled={!quickCaptureText.trim() || quickCaptureBusy} onClick={analyzeQuickCapture}>
                {quickCaptureBusy ? "Analyzing..." : "Analyze with AI"}
              </button>
            </div>
          </div>
          <div className="card">
            <div className="toolbar">
              <input type="text" placeholder="Search complainant, description, facility..." value={search} onChange={e => setSearch(e.target.value)} />
              <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ width: "170px" }}>
                <option value="">All statuses</option>
                {STATUS_PIPELINE.map(s => <option key={s}>{s}</option>)}
              </select>
              <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} style={{ width: "180px" }}>
                <option value="">All categories</option>
                {categories.map(c => <option key={c}>{c}</option>)}
              </select>
              <select value={filterPriority} onChange={e => setFilterPriority(e.target.value)} style={{ width: "140px" }}>
                <option value="">All priorities</option>
                {PRIORITY_OPTIONS.map(p => <option key={p}>{p}</option>)}
              </select>
              <select value={filterOfficial} onChange={e => setFilterOfficial(e.target.value)} style={{ width: "170px" }}>
                <option value="">All officials</option>
                {officials.map(o => <option key={o}>{o}</option>)}
              </select>
              <button className="btn gold" onClick={() => { setEditing(null); setPrefillForForm(null); setShowForm(true); }}>+ Log Complaint</button>
              <span className="pill">{filtered.length} shown</span>
            </div>

            <div className="desktop-only">
              <table>
                <thead>
                  <tr>
                    <th>Complainant</th><th>Source</th><th>Category</th><th>Priority</th><th>Age</th><th>Status</th><th>Assigned</th><th></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(c => (
                    <tr key={c.id}>
                      <td><strong>{c.complainantName || "(unnamed)"}</strong>{c.facility && <div className="small">{c.facility}</div>}</td>
                      <td><span className={"badge source-" + c.source}>{c.source}</span></td>
                      <td>{c.category || <span className="small">Uncategorised</span>}</td>
                      <td><span className={"badge priority-" + c.priority}>{c.priority}</span></td>
                      <td>
                        {c.hoursOpen === null ? <span className="small">unknown</span> : (
                          <span className={"badge " + (c.overdue ? "overdue" : "ok")}>{c.hoursOpen}h</span>
                        )}
                      </td>
                      <td>
                        <select style={{ width: "150px" }} value={c.status} onChange={e => updateComplaintStatus(c.id, e.target.value)}>
                          {STATUS_PIPELINE.map(s => <option key={s}>{s}</option>)}
                        </select>
                      </td>
                      <td>{c.assignedTo || <span className="small">Unassigned</span>}</td>
                      <td>
                        <div className="flex">
                          <button className="btn ghost small" onClick={() => { setEditing(c); setShowForm(true); }}>Edit</button>
                          <button className="btn danger small" onClick={() => deleteComplaint(c.id)}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {filtered.map(c => (
              <div className="complaint-card mobile-only" key={"m" + c.id}>
                <div className="cc-top">
                  <div>
                    <div className="cc-name">{c.complainantName || "(unnamed)"}</div>
                    <div className="cc-meta">{c.category || "Uncategorised"} · {c.facility || "no facility"}</div>
                  </div>
                  <span className={"badge " + statusClass(c.status)}>{c.status}</span>
                </div>
                <div className="cc-meta" style={{ marginTop: "6px" }}>
                  <span className={"badge priority-" + c.priority}>{c.priority}</span>{" "}
                  {c.hoursOpen !== null && <span className={"badge " + (c.overdue ? "overdue" : "ok")}>{c.hoursOpen}h open</span>}{" "}
                  {c.assignedTo || "Unassigned"}
                </div>
                <div className="field" style={{ marginTop: "8px" }}>
                  <select value={c.status} onChange={e => updateComplaintStatus(c.id, e.target.value)}>
                    {STATUS_PIPELINE.map(s => <option key={s}>{s}</option>)}
                  </select>
                </div>
                <div className="flex" style={{ marginTop: "6px" }}>
                  <button className="btn ghost small" onClick={() => { setEditing(c); setShowForm(true); }}>Edit</button>
                  <button className="btn danger small" onClick={() => deleteComplaint(c.id)}>Delete</button>
                </div>
              </div>
            ))}
            {filtered.length === 0 && <p className="small">No complaints logged yet.</p>}
          </div>
          </React.Fragment>
        )}
        {tab === "import" && (
          <React.Fragment>
            <div className="card">
              <h2>Bring In Officials From the Facilities Dashboard</h2>
              <p className="small">If officials are already entered in the 115 Facilities Monitoring Dashboard, import that tool's JSON backup here instead of retyping the same team.</p>
              <button className="btn gold" onClick={() => dashboardInputRef.current.click()}>Import Officials from Dashboard Backup (JSON)</button>
              <input type="file" accept="application/json" ref={dashboardInputRef} style={{ display: "none" }} onChange={importOfficialsFromDashboard} />
            </div>
            <div className="card">
              <h2>Bulk Import Complaints (CSV)</h2>
              <p className="small">Two easy ways to load complaints at once. Header row: <code>source,complainantname,contact,channel,facility,category,priority,description,datereceived,status,assignedto</code>.</p>
              <div className="upload-row">
                <button className="btn ghost" onClick={downloadCSVTemplate}>1. Download CSV template</button>
                <span className="small">Open it in Excel or Google Sheets, fill in your complaints, save.</span>
              </div>
              <div className="upload-row">
                <button className="btn gold" onClick={() => csvInputRef.current.click()}>2. Upload your CSV file</button>
                <input type="file" accept=".csv,text/csv" ref={csvInputRef} style={{ display: "none" }} onChange={handleCSVFile} />
                <span className="small">Loads the file below so you can check it before importing.</span>
              </div>
              <p className="small" style={{ marginTop: "10px", marginBottom: "4px" }}>…or paste rows directly:</p>
              <textarea rows="8" value={csvText} onChange={e => setCsvText(e.target.value)} placeholder="source,complainantname,contact,channel,facility,category,priority,description,datereceived,status,assignedto"></textarea>
              <div className="flex" style={{ marginTop: "10px" }}>
                <button className="btn gold" disabled={!csvText.trim()} onClick={handleImportCSV}>Import Rows</button>
                {csvText.trim() && <button className="btn ghost" onClick={() => setCsvText("")}>Clear</button>}
              </div>
            </div>
            <div className="card">
              <h2>Export</h2>
              <div className="flex">
                <button className="btn" onClick={exportComplaintsCSV}>Export Complaints CSV</button>
              </div>
              <div className="flex" style={{ marginTop: "8px" }}>
                <button className="btn ghost" onClick={exportJSONBackup}>Download full backup (JSON)</button>
                <button className="btn ghost" onClick={() => jsonInputRef.current.click()}>Restore from backup (JSON)</button>
                <input type="file" accept="application/json" ref={jsonInputRef} style={{ display: "none" }} onChange={importJSONBackup} />
              </div>
              <p className="small" style={{ marginTop: "8px" }}>Data lives only in this browser's local storage. Download a JSON backup periodically — clearing browser data or switching computers will lose everything otherwise.</p>
            </div>
          </React.Fragment>
        )}
        {tab === "settings" && (
          <React.Fragment>
            <div className="card">
              <h2>Categories</h2>
              <p className="small">A best-guess starting list, not yet confirmed with Neil — add, rename (remove + re-add), or delete to match how complaints are actually classified in practice.</p>
              <div className="flex">
                <input type="text" style={{ width: "220px" }} value={newCategory} onChange={e => setNewCategory(e.target.value)} placeholder="Add category..." />
                <button className="btn gold" onClick={addCategory}>Add</button>
              </div>
              <div style={{ marginTop: "10px" }}>
                {categories.length === 0 && <p className="small">No categories yet.</p>}
                {categories.map(c => (
                  <span key={c} className="pill" style={{ marginRight: "6px", marginBottom: "6px", display: "inline-block" }}>
                    {c} <button className="close-x" style={{ float: "none", fontSize: "12px", marginLeft: "4px" }} onClick={() => removeCategory(c)}>✕</button>
                  </span>
                ))}
              </div>
            </div>
            <div className="card">
              <h2>Officials</h2>
              <div className="flex">
                <input type="text" style={{ width: "220px" }} value={newOfficial} onChange={e => setNewOfficial(e.target.value)} placeholder="Add official name..." />
                <button className="btn gold" onClick={addOfficial}>Add</button>
              </div>
              <div style={{ marginTop: "10px" }}>
                {officials.length === 0 && <p className="small">No officials added yet — add them here, or import from the Dashboard backup on the Import / Export tab.</p>}
                {officials.map(o => (
                  <span key={o} className="pill" style={{ marginRight: "6px", marginBottom: "6px", display: "inline-block" }}>
                    {o} <button className="close-x" style={{ float: "none", fontSize: "12px", marginLeft: "4px" }} onClick={() => removeOfficial(o)}>✕</button>
                  </span>
                ))}
              </div>
            </div>
            <div className="card">
              <h2>Overdue Threshold</h2>
              <div className="field">
                <label>Hours since received before an unresolved complaint is flagged overdue</label>
                <input type="number" min="1" max="720" value={overdueHours} onChange={e => setOverdueHours(Math.max(1, Number(e.target.value) || DEFAULT_OVERDUE_HOURS))} />
                <p className="small">Default 48h, matching the "open complaints &gt;48h old" rule of thumb.</p>
              </div>
            </div>
            <div className="card">
              <h2>Anthropic API (for AI-Assisted Intake &amp; Response Drafting)</h2>
              <div className="field">
                <label>API Key</label>
                <input type="password" value={apiKey} onChange={e => setApiKey(sanitizeApiKey(e.target.value))} placeholder="sk-ant-..." />
                <p className="small">Pasted keys are cleaned automatically (stray spaces or invisible characters from copy/paste are stripped).</p>
              </div>
              <div className="field">
                <label>Model</label>
                <input type="text" value={model} onChange={e => setModel(e.target.value)} />
                <p className="small">Default is claude-sonnet-5. Update this if Anthropic renames or retires the model.</p>
              </div>
              <p className="small">Your key is stored only in this browser's local storage and sent directly to Anthropic's API — never through any other server.</p>
            </div>
            <div className="card">
              <h2>Neil's Voice Profile</h2>
              <p className="small">Paste real examples of complaint responses Neil has actually written. The AI Response Drafter uses these as style anchors so drafts sound like him, not a generic persona — the source-based register (politician/public/internal) still applies underneath. Leave empty and drafts fall back to a neutral professional tone.</p>
              <div className="field">
                <label>Style notes (optional)</label>
                <textarea rows="2" value={voiceNotes} onChange={e => setVoiceNotes(e.target.value)} placeholder="e.g. opens with acknowledgement, avoids jargon, signs off 'Kind regards, Neil Arendse, Senior Manager: PT Facilities &amp; Enforcement'" />
              </div>
              <div className="field">
                <label>Add a real response Neil has written</label>
                <textarea rows="4" value={newVoiceSample} onChange={e => setNewVoiceSample(e.target.value)} placeholder="Paste one example response here..." />
                <button className="btn gold small" style={{ marginTop: "6px" }} onClick={addVoiceSample} disabled={!newVoiceSample.trim()}>Add Example</button>
              </div>
              {voiceSamples.length === 0 && <p className="small">No examples yet — the drafter will use the source-based register only.</p>}
              {voiceSamples.map((s, i) => (
                <div className="ai-box" key={i}>
                  {s}
                  <div style={{ marginTop: "8px" }}>
                    <button className="btn danger small" onClick={() => removeVoiceSample(i)}>Remove</button>
                  </div>
                </div>
              ))}
            </div>
          </React.Fragment>
        )}
        <p className="footer-note">Neil Arendse Toolkit — Complaint Manager &amp; AI Response Drafter v1 · Data stored locally in this browser only.</p>
      </main>
      {showForm && (
        <ComplaintForm
          initial={editing}
          prefill={prefillForForm}
          officials={officials}
          categories={categories}
          apiKey={apiKey}
          model={model}
          voiceSamples={voiceSamples}
          voiceNotes={voiceNotes}
          onSave={saveComplaint}
          onSaveVoiceSample={saveVoiceSampleFromDraft}
          onCancel={() => { setShowForm(false); setEditing(null); setPrefillForForm(null); }}
        />
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  // See Facilities_Monitoring_Dashboard.html / CLAUDE.md CRITICAL LESSON for why this manual-transform
  // pattern is used instead of the automatic <script type="text/babel"> scan: babel-standalone's default
  // JSX runtime is "automatic", which injects an ES module import that cannot execute in a plain script
  // tag and silently fails to mount the app (blank page, no visible error).
  (function () {
    var src = document.getElementById("app-source").textContent;
    try {
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      new Function(out)();
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div style="padding:24px;font-family:sans-serif;color:#B0413E;">' +
        '<h2>This tool failed to start</h2><p>' + (e && e.message ? e.message : e) +
        '</p><p style="color:#5B6B7A;font-size:13px;">Send this message to Matthew — it means something changed in how the browser runs this file.</p></div>';
    }
  })();
</script>
</body>
</html>
