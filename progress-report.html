<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Progress Report Builder — City of Cape Town</title>

<style>

    --navy:#1A3A5C;

  button.btn.danger{background:var(--bad);}
  button.btn.small{padding:5px 10px;font-size:11.5px;}
  button.btn.big{padding:16px 20px;font-size:15px;width:100%;}
  button.btn:disabled{opacity:0.5;cursor:not-allowed;}
  input,select,textarea{font-family:inherit;font-size:13.5px;padding:8px 10px;border-radius:7px;border:1px solid #C7D3DE;width:100%;background:#fff;color:var(--ink);}
  label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;}
  .field{margin-bottom:10px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:2px solid #E2E9F0;padding:8px 8px;}

  tr:hover td{background:#F7FAFC;}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .pill{background:var(--slate);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--navy);border:1px solid #DCE4EC;}
  .small{font-size:11.5px;color:var(--muted);}
  .flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .footer-note{text-align:center;color:var(--muted);font-size:11.5px;margin-top:24px;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
  .report-box{background:#fff;}
  .report-box h3{color:var(--navy);font-size:14px;margin:18px 0 8px;border-bottom:1px solid #E2E9F0;padding-bottom:6px;}
  .report-box h3:first-child{margin-top:0;}
  .report-box p{line-height:1.55;font-size:13.5px;}
  .report-box ul{padding-left:20px;margin:6px 0;}
  .report-box li{margin-bottom:5px;font-size:13.5px;line-height:1.5;}
  .warn-box{background:#FBEDEC;border:1px solid #F0C9C6;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;color:#7A2E2A;}
  .info-box{background:#EAF1F8;border:1px solid #C9DBEC;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;color:var(--navy);}
  .source-status{display:flex;gap:14px;flex-wrap:wrap;}
  .source-status .chip{background:var(--slate);border:1px solid #E2E9F0;border-radius:8px;padding:10px 14px;font-size:12.5px;}
  .source-status .chip b{color:var(--navy);}

  .period-toggle{display:flex;gap:6px;}
  .period-toggle button{flex:1;}
  .period-toggle button.active{background:var(--navy);color:#fff;}
  .period-toggle button:not(.active){background:#fff;color:var(--navy);border:1px solid #C7D3DE;}
  @media print{
    header.app-header, nav.tabs, .no-print{display:none !important;}
    body{background:#fff;}
    main{max-width:100%;padding:0;}
    .card{box-shadow:none;border:1px solid #999;}
  }
</style>

<body>
<div id="root"></div>
<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo } = React;

const STORAGE_KEY = "neil_progress_report_v1";
const DASHBOARD_KEY = "neil_facilities_monitoring_v2";
const COMPLAINT_KEY = "neil_complaint_manager_v1";
const DEFAULT_MODEL = "claude-sonnet-5";
const DEFAULT_OVERDUE_DAYS = 30;
const CLOSED_WO_STATUSES = ["Resolved", "Closed"];
const RESOLVED_COMPLAINT_STATUSES = ["Responded", "Closed"];
const SOURCE_OPTIONS = ["Politician", "Public", "Internal"];

// --- date helpers -----------------------------------------------------

function pad2(n) { return String(n).padStart(2, "0"); }

function fmtDateISO(d) {
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
}

// Parses a YYYY-MM-DD string as a local-midnight Date, same convention used
// by the Dashboard/Complaint Manager's own date-only fields.
function parseISODate(s) {
  if (!s) return null;
  const d = new Date(s + "T00:00:00");
  return isNaN(d.getTime()) ? null : d;
}

function addDays(d, n) {
  const nd = new Date(d);
  nd.setDate(nd.getDate() + n);
  return nd;
}

function mondayOf(d) {
  const nd = new Date(d);
  const day = nd.getDay(); // 0=Sun..6=Sat
  const diff = day === 0 ? -6 : 1 - day;
  return addDays(nd, diff);
}

function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }

function weekRange(refDate, weeksAgo) {
  const ref = addDays(refDate, -7 * (weeksAgo || 0));
  const start = mondayOf(ref);
  const end = addDays(start, 6);
  return { start: fmtDateISO(start), end: fmtDateISO(end) };
}

function monthRange(refDate, monthsAgo) {
  const ref = new Date(refDate.getFullYear(), refDate.getMonth() - (monthsAgo || 0), 1);
  return { start: fmtDateISO(startOfMonth(ref)), end: fmtDateISO(endOfMonth(ref)) };
}

const MONTH_NAMES = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

function shortDate(iso) {
  const d = parseISODate(iso);
  if (!d) return iso;
  return d.getDate() + " " + MONTH_NAMES[d.getMonth()].slice(0, 3);
}

function periodLabel(period) {
  if (!period) return "";
  if (period.type === "month") {
    const d = parseISODate(period.start);
    return d ? (MONTH_NAMES[d.getMonth()] + " " + d.getFullYear()) : (period.start + " – " + period.end);
  }
  const endD = parseISODate(period.end);
  const year = endD ? endD.getFullYear() : "";
  return "Week of " + shortDate(period.start) + " – " + shortDate(period.end) + (year ? ", " + year : "");
}

// Inclusive range check on YYYY-MM-DD strings — safe to compare lexically.
function dateInRange(dateStr, start, end) {
  if (!dateStr) return false;
  return dateStr >= start && dateStr <= end;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const then = parseISODate(dateStr);
  if (!then) return null;
  return Math.floor((Date.now() - then.getTime()) / (1000 * 60 * 60 * 24));
}

// Both endpoints are date-only strings (same convention as the Complaint
// Manager's own hoursSince) — this is "days between, in hours" plus whatever
// partial-day precision that convention already accepts.
function hoursBetween(startStr, endStr) {
  const s = parseISODate(startStr), e = parseISODate(endStr);
  if (!s || !e) return null;
  return Math.max(0, Math.floor((e.getTime() - s.getTime()) / (1000 * 60 * 60)));
}

function maintenanceOverdue(task) {
  if (!task.lastCompleted) return true;
  const last = parseISODate(task.lastCompleted);
  if (!last) return true;
  const dueDate = addDays(last, task.frequencyDays || 0);
  return dueDate.getTime() < Date.now();
}

function avg(nums) {
  const list = nums.filter(n => typeof n === "number" && !isNaN(n));
  if (list.length === 0) return null;
  return Math.round((list.reduce((a, b) => a + b, 0) / list.length) * 10) / 10;
}

// --- reading the other two tools' localStorage (read-only) ------------

function readJSONKey(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    console.error("Failed to read " + key, e);
    return null;
  }
}

function readDashboardData() {
  return readJSONKey(DASHBOARD_KEY) || {};
}

function readComplaintData() {
  return readJSONKey(COMPLAINT_KEY) || {};
}

// --- pure metrics computation (directly testable) ----------------------

function computeMetrics(dashboardData, complaintData, period) {
  const facilities = (dashboardData && dashboardData.facilities) || [];
  const overdueDays = (dashboardData && dashboardData.overdueDays) || DEFAULT_OVERDUE_DAYS;

  const statusBreakdown = { Operational: 0, "Needs Attention": 0, "Under Repair": 0, Closed: 0 };
  facilities.forEach(f => {
    if (statusBreakdown[f.status] === undefined) statusBreakdown[f.status] = 0;
    statusBreakdown[f.status] += 1;
  });

  const overdueFacilities = facilities.filter(f => {
    const d = daysSince(f.lastInspected);
    return d === null || d > overdueDays;
  });

  const allWOs = facilities.flatMap(f => (f.issues || []).map(w => Object.assign({}, w, { facilityName: f.name })));
  const openWOs = allWOs.filter(w => !CLOSED_WO_STATUSES.includes(w.status));
  const openWOsBySeverity = { High: 0, Medium: 0, Low: 0 };
  openWOs.forEach(w => { if (openWOsBySeverity[w.severity] !== undefined) openWOsBySeverity[w.severity] += 1; });

  const resolvedWOsInPeriod = allWOs.filter(w => CLOSED_WO_STATUSES.includes(w.status) && w.dateResolved && dateInRange(w.dateResolved, period.start, period.end));

  const allMaintenance = facilities.flatMap(f => (f.maintenanceTasks || []).map(t => Object.assign({}, t, { facilityName: f.name })));
  const overdueMaintenance = allMaintenance.filter(maintenanceOverdue);

  const contractorMap = {};
  allWOs.forEach(w => {
    const name = (w.contractor || "").trim();
    if (!name) return;
    if (!contractorMap[name]) contractorMap[name] = { contractor: name, total: 0, open: 0, resolvedInPeriod: 0 };
    contractorMap[name].total += 1;
    if (!CLOSED_WO_STATUSES.includes(w.status)) contractorMap[name].open += 1;
  });
  resolvedWOsInPeriod.forEach(w => {
    const name = (w.contractor || "").trim();
    if (name && contractorMap[name]) contractorMap[name].resolvedInPeriod += 1;
  });
  const contractorPerformance = Object.values(contractorMap).sort((a, b) => b.open - a.open);

  const complaints = (complaintData && complaintData.complaints) || [];
  const periodComplaints = complaints.filter(c => dateInRange(c.dateReceived, period.start, period.end));
  const respondedInPeriod = periodComplaints.filter(c => RESOLVED_COMPLAINT_STATUSES.includes(c.status));
  const stillOpenInPeriod = periodComplaints.length - respondedInPeriod.length;

  const respondedWithTimes = periodComplaints.filter(c => c.dateResponded);
  const avgResponseHours = avg(respondedWithTimes.map(c => hoursBetween(c.dateReceived, c.dateResponded)));

  const bySource = { Politician: 0, Public: 0, Internal: 0 };
  const byPriority = { Low: 0, Medium: 0, High: 0 };
  periodComplaints.forEach(c => {
    if (bySource[c.source] !== undefined) bySource[c.source] += 1;
    if (byPriority[c.priority] !== undefined) byPriority[c.priority] += 1;
  });

  const bySourceAvgHours = {};
  SOURCE_OPTIONS.forEach(src => {
    const list = respondedWithTimes.filter(c => c.source === src).map(c => hoursBetween(c.dateReceived, c.dateResponded));
    bySourceAvgHours[src] = avg(list);
  });

  // Current backlog snapshot (not period-scoped) — mirrors how the Dashboard's
  // facility status is a live snapshot rather than something logged in a window.
  const draftedNotSent = complaints.filter(c => c.status === "Response Drafted").length;
  const politicianOpenNow = complaints.filter(c => c.source === "Politician" && !RESOLVED_COMPLAINT_STATUSES.includes(c.status)).length;

  return {
    period,
    facilities: {
      total: facilities.length,
      statusBreakdown,
      overdueInspectionsCount: overdueFacilities.length,
      overdueFacilityNames: overdueFacilities.map(f => f.name),
      openWorkOrdersTotal: openWOs.length,
      openWorkOrdersBySeverity: openWOsBySeverity,
      resolvedWorkOrdersInPeriod: resolvedWOsInPeriod.length,
      overdueMaintenanceCount: overdueMaintenance.length,
      overdueMaintenanceNames: overdueMaintenance.map(t => t.facilityName + ": " + t.name),
      contractorPerformance
    },
    complaints: {
      totalLoggedThisPeriod: periodComplaints.length,
      respondedThisPeriod: respondedInPeriod.length,
      stillOpenThisPeriod: stillOpenInPeriod,
      avgResponseHours,
      bySource,
      byPriority,
      bySourceAvgHours,
      draftedNotSentBacklog: draftedNotSent,
      politicianOpenBacklog: politicianOpenNow
    }
  };
}

// --- prompt construction (pure, directly testable) ----------------------

function buildReportPrompt(dashboardData, complaintData, reportPeriod) {
  const m = computeMetrics(dashboardData, complaintData, reportPeriod);
  const label = periodLabel(reportPeriod);
  const f = m.facilities, c = m.complaints;

  const statusLines = Object.keys(f.statusBreakdown).map(k => k + ": " + f.statusBreakdown[k]).join(", ");
  const contractorLines = f.contractorPerformance.length
    ? f.contractorPerformance.map(cp => cp.contractor + " (open: " + cp.open + ", resolved this period: " + cp.resolvedInPeriod + ", total: " + cp.total + ")").join("; ")
    : "no contractor-assigned work orders on record";
  const overdueFacList = f.overdueFacilityNames.length ? f.overdueFacilityNames.slice(0, 20).join(", ") : "none";
  const overdueMaintList = f.overdueMaintenanceNames.length ? f.overdueMaintenanceNames.slice(0, 20).join(", ") : "none";

  const sourceLines = SOURCE_OPTIONS.map(s => s + ": " + c.bySource[s] + " (avg hours to response: " + (c.bySourceAvgHours[s] === null ? "n/a" : c.bySourceAvgHours[s]) + ")").join(", ");
  const priorityLines = Object.keys(c.byPriority).map(k => k + ": " + c.byPriority[k]).join(", ");

  return "You are writing a " + (reportPeriod.type === "month" ? "monthly" : "weekly") + " progress report for Neil Arendse, Senior Manager: Public Transportation Facilities Management and Enforcement, City of Cape Town. "
    + "This report covers BOTH facility management operations and public complaints handling for the period " + label + " (" + reportPeriod.start + " to " + reportPeriod.end + "). "
    + "Synthesize the two data sources below into ONE cohesive narrative — do not just summarize each system separately as if writing two disconnected reports. Identify how facility issues and complaints relate where relevant (e.g. a facility with an overdue inspection also generating complaints), and identify the single highest-priority item across both systems for the executive summary.\n\n"
    + "=== FACILITY MANAGEMENT DATA ===\n"
    + "Total facilities monitored: " + f.total + "\n"
    + "Status breakdown: " + statusLines + "\n"
    + "Facilities overdue for inspection: " + f.overdueInspectionsCount + " (" + overdueFacList + ")\n"
    + "Open work orders: " + f.openWorkOrdersTotal + " (High: " + f.openWorkOrdersBySeverity.High + ", Medium: " + f.openWorkOrdersBySeverity.Medium + ", Low: " + f.openWorkOrdersBySeverity.Low + ")\n"
    + "Work orders resolved this period: " + f.resolvedWorkOrdersInPeriod + "\n"
    + "Overdue preventative maintenance tasks: " + f.overdueMaintenanceCount + " (" + overdueMaintList + ")\n"
    + "Contractor performance: " + contractorLines + "\n\n"
    + "=== COMPLAINTS DATA ===\n"
    + "Total complaints logged this period: " + c.totalLoggedThisPeriod + "\n"
    + "Responded this period: " + c.respondedThisPeriod + "\n"
    + "Still open (logged this period, not yet responded/closed): " + c.stillOpenThisPeriod + "\n"
    + "Average response time this period (hours): " + (c.avgResponseHours === null ? "n/a — no responses recorded this period" : c.avgResponseHours) + "\n"
    + "Breakdown by source: " + sourceLines + "\n"
    + "Priority distribution: " + priorityLines + "\n"
    + "Current backlog (not period-limited, live snapshot): " + c.draftedNotSentBacklog + " responses drafted but not yet sent; " + c.politicianOpenBacklog + " politician complaints currently open/unresolved\n\n"
    + "Respond with ONLY a JSON object, no other text, no markdown fences, matching exactly this shape:\n"
    + '{"summary": "2-3 sentence executive summary: workload snapshot + the single highest-priority item across both systems", '
    + '"facilitiesSection": "bullet-point text (use \\n between bullets, each starting with \\"- \\") covering facility status counts and highlighting overdue inspections and critical maintenance", '
    + '"complaintsSection": "bullet-point text (use \\n between bullets, each starting with \\"- \\") covering complaints logged/responded/open this period, flagging politician complaints and drafted-but-unsent responses", '
    + '"keyMetrics": "a compact plain-text list of \\"Label: value\\" lines (one per line) presenting the specific numbers above", '
    + '"nextWeekFocus": "1-2 bullet-point lines (use \\n between bullets, each starting with \\"- \\") on what Neil should prioritize next, derived directly from the data"}';
}

// Tolerant JSON parse — same fallback pattern as the Complaint Manager's AI
// Intake: if Claude wraps the JSON in prose or markdown fences, recover it.
function parseReportJSON(raw) {
  try {
    return JSON.parse(raw);
  } catch (e) {
    const match = raw.match(/\{[\s\S]*\}/);
    if (match) {
      try { return JSON.parse(match[0]); } catch (e2) { /* fall through */ }
    }
    return null;
  }
}

// --- Claude API call (same pattern as the other two tools) --------------

function sanitizeApiKey(raw) {
  return String(raw || "").replace(/\s+/g, "").replace(/[^\x20-\x7E]/g, "");
}

function friendlyErrorMessage(e) {
  const msg = e && e.message ? e.message : String(e);
  if (/ISO-8859-1|code point/i.test(msg)) {
    return "Your API key contains a character the browser can't send (likely from copy-pasting). Try deleting it in Settings and re-typing or re-pasting it fresh.";
  }
  return msg;
}

async function callClaude(apiKey, model, prompt) {
  const cleanKey = sanitizeApiKey(apiKey);
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": cleanKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: model,
      max_tokens: 1200,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error("API error " + resp.status + ": " + errText.slice(0, 300));
  }
  const data = await resp.json();
  const text = (data.content && data.content[0] && data.content[0].text) || "";
  return text;
}

// --- persistence for this tool's own settings/report ---------------------

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    console.error("Failed to load saved state", e);
    return null;
  }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error("Failed to save state", e);
  }
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function uid() {
  if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return "id-" + Math.random().toString(36).slice(2) + Date.now();
}

function StatCard({ num, label, alert }) {
  return (
    <div className={"stat" + (alert ? " alert" : "")}>
      <div className="num">{num}</div>
      <div className="lbl">{label}</div>
    </div>
  );
}

// Renders "- bullet\n- bullet" style text (what we ask Claude for) as a real
// <ul>. Falls back to a single paragraph if the text has no bullet markers.
function BulletText({ text }) {
  const lines = String(text || "").split("\n").map(l => l.trim()).filter(Boolean);
  const bullets = lines.filter(l => l.startsWith("- "));
  if (bullets.length === 0 && lines.length > 0) {
    return <p>{lines.join(" ")}</p>;
  }
  return (
    <ul>
      {lines.map((l, i) => <li key={i}>{l.replace(/^-\s*/, "")}</li>)}
    </ul>
  );
}

function KeyMetricsTable({ text }) {
  const lines = String(text || "").split("\n").map(l => l.trim()).filter(Boolean);
  const rows = lines.map(l => {
    const idx = l.indexOf(":");
    return idx === -1 ? [l, ""] : [l.slice(0, idx).trim(), l.slice(idx + 1).trim()];
  });
  return (
    <table className="metrics-table">
      <tbody>
        {rows.map((r, i) => <tr key={i}><td>{r[0]}</td><td>{r[1]}</td></tr>)}
      </tbody>
    </table>
  );
}

function SettingsTab({ period, setPeriod, model, setModel, apiKey, setApiKey, dashboardData, complaintData, onExport, onImport }) {
  const dashCount = (dashboardData.facilities || []).length;
  const complaintCount = (complaintData.complaints || []).length;

  function applyPreset(type, offset) {
    const today = new Date();
    const range = type === "month" ? monthRange(today, offset) : weekRange(today, offset);
    setPeriod({ type, start: range.start, end: range.end });
  }

  return (
    <React.Fragment>
      <div className="card">
        <h2>Report Period</h2>
        <div className="period-toggle" style={{ marginBottom: 12 }}>
          <button className={period.type === "week" ? "active" : ""} onClick={() => applyPreset("week", 0)}>Week</button>
          <button className={period.type === "month" ? "active" : ""} onClick={() => applyPreset("month", 0)}>Month</button>
        </div>
        <div className="flex" style={{ marginBottom: 12 }}>
          <button className="btn ghost small" onClick={() => applyPreset(period.type, 0)}>Current {period.type === "month" ? "month" : "week"}</button>
          <button className="btn ghost small" onClick={() => applyPreset(period.type, 1)}>Previous {period.type === "month" ? "month" : "week"}</button>
        </div>
        <div className="grid cols-2">
          <div className="field">
            <label>Period start</label>
            <input type="date" value={period.start} onChange={e => setPeriod({ ...period, start: e.target.value })} />
          </div>
          <div className="field">
            <label>Period end</label>
            <input type="date" value={period.end} onChange={e => setPeriod({ ...period, end: e.target.value })} />
          </div>
        </div>
        <p className="small">Currently set to: <b>{periodLabel(period)}</b>. Dates can be overridden manually for any custom range.</p>
      </div>

      <div className="card">
        <h2>Data Sources (read-only)</h2>
        <div className="source-status">
          <div className="chip">Dashboard facilities: <b>{dashCount}</b>{dashCount === 0 ? " — no data found in this browser" : ""}</div>
          <div className="chip">Complaints logged: <b>{complaintCount}</b>{complaintCount === 0 ? " — no data found in this browser" : ""}</div>
        </div>
        <p className="small">This tool reads directly from the Dashboard's (<code>{DASHBOARD_KEY}</code>) and Complaint Manager's (<code>{COMPLAINT_KEY}</code>) browser storage on this device. It never writes back to either — purely read-only.</p>
      </div>

      <div className="card">
        <h2>AI Settings</h2>
        <div className="field">
          <label>Anthropic API Key</label>
          <input type="password" value={apiKey} onChange={e => setApiKey(sanitizeApiKey(e.target.value))} placeholder="sk-ant-..." />
        </div>
        <div className="field">
          <label>Model name</label>
          <input type="text" value={model} onChange={e => setModel(e.target.value)} />
          <p className="small">Default is claude-sonnet-5. Update this if Anthropic renames or retires the model.</p>
        </div>
      </div>

      <div className="card">
        <h2>Export / Import</h2>
        <div className="flex">
          <button className="btn ghost" onClick={onExport}>Export Backup (JSON)</button>
          <label className="btn ghost" style={{ cursor: "pointer" }}>
            Import Backup (JSON)
            <input type="file" accept=".json" style={{ display: "none" }} onChange={onImport} />
          </label>
        </div>
        <p className="small">Backs up this tool's own settings and the most recently generated report. It does not affect the Dashboard or Complaint Manager's own data.</p>
      </div>
    </React.Fragment>
  );
}

function DashboardTab({ period, report, reportAt, busy, onGenerate, dashboardData, complaintData }) {
  const dashCount = (dashboardData.facilities || []).length;
  const complaintCount = (complaintData.complaints || []).length;
  const nothingToReadYet = dashCount === 0 && complaintCount === 0;
  const nextFocusHeading = "Next " + (period.type === "month" ? "Month's" : "Week's") + " Focus";

  return (
    <React.Fragment>
      <div className="card">
        <div className="header-row" style={{ marginBottom: 10 }}>
          <div>
            <h2 style={{ margin: 0 }}>{periodLabel(period)}</h2>
            <p className="small" style={{ margin: "4px 0 0" }}>{reportAt ? "Last generated " + new Date(reportAt).toLocaleString() : "Not generated yet"}</p>
          </div>
          <button className="btn gold" disabled={busy} onClick={onGenerate}>{busy ? "Generating…" : "Generate Report Now"}</button>
        </div>
        {nothingToReadYet && (
          <div className="warn-box">No Dashboard or Complaint Manager data found in this browser yet. You can still generate a report — it will simply show zeros — but it will be far more useful once facilities and complaints have been logged in those two tools on this device.</div>
        )}
        {!nothingToReadYet && (dashCount === 0 || complaintCount === 0) && (
          <div className="info-box">
            {dashCount === 0 && "No Dashboard facility data found on this device. "}
            {complaintCount === 0 && "No Complaint Manager data found on this device. "}
            The report will note this limitation for that system.
          </div>
        )}
      </div>

      {!report && (
        <div className="card empty-state">
          <p>No report generated yet for this period.</p>
          <p className="small">Click "Generate Report Now" above to synthesize the current Dashboard and Complaint Manager data into a narrative report.</p>
        </div>
      )}

      {report && (
        <div className="card report-box">
          <div className="flex no-print" style={{ justifyContent: "flex-end", marginBottom: 6 }}>
            <button className="btn ghost small" onClick={() => {
              const text = "Executive Summary\n" + report.summary + "\n\nFacilities Status\n" + report.facilitiesSection + "\n\nComplaints Summary\n" + report.complaintsSection + "\n\nKey Metrics\n" + report.keyMetrics + "\n\n" + nextFocusHeading + "\n" + report.nextWeekFocus;
              navigator.clipboard.writeText(text).then(() => alert("Report copied to clipboard.")).catch(() => alert("Could not copy — your browser may be blocking clipboard access."));
            }}>Copy Report to Clipboard</button>
            <button className="btn ghost small" onClick={() => window.print()}>Export as PDF</button>
          </div>
          <h3>Executive Summary</h3>
          <p>{report.summary}</p>
          <h3>Facilities Status</h3>
          <BulletText text={report.facilitiesSection} />
          <h3>Complaints Summary</h3>
          <BulletText text={report.complaintsSection} />
          <h3>Key Metrics</h3>
          <KeyMetricsTable text={report.keyMetrics} />
          <h3>{nextFocusHeading}</h3>
          <BulletText text={report.nextWeekFocus} />
        </div>
      )}
    </React.Fragment>
  );
}

function App() {
  const saved = loadState();
  const today = new Date();
  const defaultPeriod = (() => {
    const r = weekRange(today, 0);
    return { type: "week", start: r.start, end: r.end };
  })();

  const [tab, setTab] = useState("dashboard");
  const [period, setPeriod] = useState(saved && saved.period ? saved.period : defaultPeriod);
  const [model, setModel] = useState(saved && saved.model ? saved.model : DEFAULT_MODEL);
  const [apiKey, setApiKey] = useState(saved && saved.apiKey ? saved.apiKey : "");
  const [report, setReport] = useState(saved && saved.report ? saved.report : null);
  const [reportAt, setReportAt] = useState(saved && saved.reportAt ? saved.reportAt : null);
  const [busy, setBusy] = useState(false);

  const [dashboardData, setDashboardData] = useState(readDashboardData());
  const [complaintData, setComplaintData] = useState(readComplaintData());

  // Re-read the other two tools' data whenever this tab regains focus, so a
  // report generated after switching back from the Dashboard/Complaint
  // Manager tabs reflects their latest state without needing a manual reload.
  useEffect(() => {
    function refresh() {
      setDashboardData(readDashboardData());
      setComplaintData(readComplaintData());
    }
    window.addEventListener("focus", refresh);
    document.addEventListener("visibilitychange", refresh);
    return () => {
      window.removeEventListener("focus", refresh);
      document.removeEventListener("visibilitychange", refresh);
    };
  }, []);

  useEffect(() => {
    saveState({ period, model, apiKey, report, reportAt });
  }, [period, model, apiKey, report, reportAt]);

  async function generateReport() {
    if (!apiKey) { alert("Add your Anthropic API key in Settings first."); setTab("settings"); return; }
    setBusy(true);
    try {
      const freshDashboard = readDashboardData();
      const freshComplaints = readComplaintData();
      setDashboardData(freshDashboard);
      setComplaintData(freshComplaints);
      const prompt = buildReportPrompt(freshDashboard, freshComplaints, period);
      const raw = await callClaude(apiKey, model, prompt);
      const parsed = parseReportJSON(raw);
      if (!parsed) {
        alert("Claude's response couldn't be parsed as a report. Try generating again.");
        return;
      }
      setReport(parsed);
      setReportAt(new Date().toISOString());
    } catch (e) {
      alert("Report generation failed: " + friendlyErrorMessage(e));
    } finally {
      setBusy(false);
    }
  }

  function handleExport() {
    const payload = { period, model, report, reportAt, exportedAt: new Date().toISOString() };
    downloadFile("progress_report_backup_" + fmtDateISO(new Date()) + ".json", JSON.stringify(payload, null, 2), "application/json");
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.period) setPeriod(data.period);
        if (data.model) setModel(data.model);
        if (data.report !== undefined) setReport(data.report);
        if (data.reportAt !== undefined) setReportAt(data.reportAt);
        alert("Backup restored.");
      } catch (err) {
        alert("Could not read that file — is it a valid backup JSON?");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  return (
    <React.Fragment>
      <header className="app-header">
        <div className="header-row">
          <div>
            <h1>AI Progress Report Builder</h1>
            <p>Neil Arendse — Public Transportation Facilities Management &amp; Enforcement</p>
          </div>
          <span className="gold-badge">{periodLabel(period)}</span>
        </div>
      </header>
      <nav className="tabs">
        <button className={tab === "dashboard" ? "active" : ""} onClick={() => setTab("dashboard")}>Dashboard</button>
        <button className={tab === "settings" ? "active" : ""} onClick={() => setTab("settings")}>Settings</button>
      </nav>
      <main>
        {tab === "dashboard" && (
          <DashboardTab period={period} report={report} reportAt={reportAt} busy={busy} onGenerate={generateReport} dashboardData={dashboardData} complaintData={complaintData} />
        )}
        {tab === "settings" && (
          <SettingsTab period={period} setPeriod={setPeriod} model={model} setModel={setModel} apiKey={apiKey} setApiKey={setApiKey} dashboardData={dashboardData} complaintData={complaintData} onExport={handleExport} onImport={handleImport} />
        )}
        <p className="footer-note no-print">Reads Dashboard and Complaint Manager data from this browser only — nothing is written back to either tool.</p>
      </main>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
